<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>THE YAK GAUNTLET</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "MS Sans Serif", Tahoma, Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      padding: 10px 10px 46px;
      background: #008080;
      color: #000;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0;
      overflow-x: hidden;
    }

    .stella-popup {
      position: fixed;
      left: 12px;
      bottom: 30px;
      width: 210px;
      max-height: 210px;
      z-index: 1420;
      pointer-events: none;
      opacity: 0;
      transform: translateY(54px) scale(0.86);
      transform-origin: bottom left;
      top: auto;
      transition: opacity 0.18s ease-out, transform 0.22s steps(3, end);
      filter: drop-shadow(2px 2px 0 #004040);
    }

    .stella-art {
      display: block;
      width: 100%;
      max-height: 210px;
      object-fit: contain;
    }


    .stella-popup.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: stellaPeek 0.9s steps(2, end) infinite;
    }

    @keyframes stellaPeek {
      0%, 100% {
        margin-bottom: 0;
      }
      50% {
        margin-bottom: 4px;
      }
    }

    .desktop-shell {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .desktop-window {
      position: relative;
      width: 100%;
      background-color: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #404040;
      border-bottom: 2px solid #404040;
      box-shadow: 2px 2px 0 #000;
      min-width: min(100%, 290px);
    }

    .desktop-window.is-dragging {
      opacity: 0.96;
      cursor: move;
    }

    .desktop-window.minimized {
      display: none;
    }

    .desktop-window.detached {
      max-height: calc(100vh - 54px);
    }

    .desktop-window.detached .window-body {
      max-height: calc(100vh - 84px);
      overflow: auto;
    }

    .desktop-window.maximized {
      position: fixed !important;
      top: 8px !important;
      left: 8px !important;
      width: calc(100vw - 16px) !important;
      height: calc(100vh - 54px) !important;
      z-index: 900 !important;
    }

    .desktop-window.maximized .window-body {
      height: calc(100% - 25px);
      overflow: auto;
    }

    .window-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 23px;
      padding: 2px 4px 2px 6px;
      color: #fff;
      font-weight: 700;
      background: linear-gradient(90deg, #000080, #1084d0);
      cursor: move;
      user-select: none;
    }

    .titlebar-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .window-icon {
      width: 14px;
      height: 14px;
      display: inline-block;
      position: relative;
      flex: 0 0 auto;
      background: #fff;
      border-top: 1px solid #fff;
      border-left: 1px solid #fff;
      border-right: 1px solid #404040;
      border-bottom: 1px solid #404040;
      box-shadow: inset 0 0 0 1px #c0c0c0;
    }

    .window-icon::before {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 5px;
      height: 5px;
      background: linear-gradient(135deg, #c0c0c0 0 50%, #fff 50%);
      border-left: 1px solid #808080;
      border-bottom: 1px solid #808080;
    }

    .window-icon::after {
      content: "";
      position: absolute;
      left: 3px;
      top: 5px;
      width: 7px;
      height: 1px;
      background: #000080;
      box-shadow: 0 3px 0 #000080;
    }

    .window-controls {
      display: flex;
      gap: 2px;
      flex: 0 0 auto;
    }

    .window-control {
      width: 17px;
      min-width: 17px;
      height: 16px;
      min-height: 16px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      line-height: 1;
      color: #000;
      background-color: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #404040;
      border-bottom: 2px solid #404040;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .window-body {
      padding: 7px;
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 6px;
      padding: 4px 6px;
      background-color: #c0c0c0;
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
    }

    h1 {
      margin: 0;
      color: #000080;
      font-size: clamp(17px, 2.2vw, 26px);
      line-height: 1;
      font-weight: 700;
      text-shadow: 1px 1px 0 #fff;
    }

    .subtitle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 34px;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .subtitle-img {
      max-width: 38px;
      max-height: 34px;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .controls-wrapper {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      gap: 6px;
      margin: 0 auto;
    }

    .controls-row {
      display: flex;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .form-row {
      flex-wrap: wrap;
    }

    .second-row {
      justify-content: space-between;
      align-items: flex-end;
      padding-top: 6px;
      border-top: 1px solid #808080;
      box-shadow: inset 0 1px 0 #fff;
    }

    .left-group,
    .right-group,
    form {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 5px;
    }

    form {
      justify-content: center;
      width: 100%;
      margin: 0;
    }

    .left-group {
      justify-content: flex-start;
    }

    .right-group {
      justify-content: flex-end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 1px;
      font-size: 10px;
      font-weight: 700;
    }

    label {
      color: #000;
    }

    input,
    select {
      min-height: 21px;
      padding: 1px 4px;
      color: #000;
      background-color: #fff;
      border-top: 2px solid #404040;
      border-left: 2px solid #404040;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      border-radius: 0;
      font: inherit;
      text-transform: uppercase;
    }

    input[type="search"] {
      min-width: 160px;
    }

    button,
    .edit-button,
    .unfilter-button,
    .open-stats-button,
    .audience-button {
      min-height: 21px;
      padding: 1px 8px;
      color: #000;
      background-color: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #404040;
      border-bottom: 2px solid #404040;
      border-radius: 0;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      text-transform: uppercase;
    }

    button:hover,
    .edit-button:hover,
    .unfilter-button:hover,
    .open-stats-button:hover,
    .audience-button:hover {
      background-color: #dcdcdc;
    }

    button:active,
    .audience-button.active {
      color: #fff;
      background-color: #000080;
      border-top: 2px solid #404040;
      border-left: 2px solid #404040;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
    }

    .audience-button.active:hover {
      background-color: #1084d0;
    }

    .scoreboard-window {
      min-height: 240px;
    }

    .table-wrapper {
      width: 100%;
      max-height: calc(100vh - 210px);
      overflow: auto;
      background-color: #fff;
      border-top: 2px solid #404040;
      border-left: 2px solid #404040;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
    }

    table#scoreboard,
    table {
      width: 100%;
      min-width: 680px;
      margin: 0;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: auto;
      background-color: #fff;
    }

    #scoreboard thead th {
      position: sticky;
      top: 0;
      z-index: 10;
      color: #000;
      background-color: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
    }

    th,
    td {
      padding: 6px 8px;
      text-align: left;
      cursor: default;
      user-select: none;
      border-right: 1px solid #c0c0c0;
      border-bottom: 1px solid #dcdcdc;
      white-space: nowrap;
    }


    table#scoreboard th:nth-child(1),
    table#scoreboard td:nth-child(1) {
      width: 54px;
      text-align: center;
    }

    table#scoreboard th:nth-child(2),
    table#scoreboard td:nth-child(2) {
      max-width: 190px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    table#scoreboard th:nth-child(5),
    table#scoreboard td:nth-child(5) {
      width: 150px;
    }

    table#scoreboard th:nth-child(6),
    table#scoreboard td:nth-child(6) {
      width: 112px;
    }

    th.sortable {
      cursor: pointer;
    }

    th.sortable:hover {
      background-color: #dcdcdc;
    }

    th.sorted-asc::after {
      content: " ▲";
      font-size: 0.8em;
    }

    th.sorted-desc::after {
      content: " ▼";
      font-size: 0.8em;
    }

    #scoreboard tbody tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    #scoreboard tbody tr:hover,
    #scoreboard tbody tr.leader:hover,
    #scoreboard tbody tr.division-leader:hover,
    #scoreboard tbody tr.today-entry:hover {
      color: #fff !important;
      background-color: #000080 !important;
    }

    #scoreboard tbody tr:hover .stopwatch {
      color: #fff !important;
    }

    .leader {
      background-color: #fff79a !important;
    }

    .division-leader {
      background-color: #c7ddff !important;
    }

    .today-entry {
      background-color: #ffd8a8 !important;
    }

    .stopwatch {
      display: inline-block;
      margin-left: 6px;
      color: #000;
      font-size: 11px;
    }

    .gold,
    .blue {
      color: #000;
    }

    .status-bar {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      justify-content: space-between;
      margin-top: 7px;
      color: #000;
      font-size: 11px;
    }

    .status-bar span {
      flex: 1 1 160px;
      min-height: 19px;
      padding: 3px 7px;
      background-color: #c0c0c0;
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
    }


    .quartile-row td {
      padding: 4px 8px;
      color: #fff;
      background: #000080;
      border-top: 2px solid #fff;
      border-bottom: 2px solid #404040;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0;
    }

    .run-stats-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 5px 10px;
      min-width: min(260px, 100%);
      padding: 6px;
      background: #fff;
      border-top: 2px solid #404040;
      border-left: 2px solid #404040;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
    }

    .run-stats-grid dt {
      font-weight: 700;
    }

    .run-stats-grid dd {
      margin: 0;
      text-align: right;
    }


    .run-stats-graphic {
      display: grid;
      gap: 7px;
      min-width: min(330px, 100%);
      padding: 7px;
      background: #fff;
      border-top: 2px solid #404040;
      border-left: 2px solid #404040;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
    }

    .stat-bar-row {
      display: grid;
      grid-template-columns: 116px 1fr 46px;
      align-items: center;
      gap: 6px;
    }

    .stat-bar-track {
      height: 16px;
      background: #c0c0c0;
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      min-width: 2px;
      background: #000080;
    }

    .wheel-panel {
      margin-top: 8px;
      padding: 7px;
      background: #c0c0c0;
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      text-align: center;
    }


    .wheel-entry-row {
      display: flex;
      gap: 5px;
      margin-bottom: 6px;
    }

    .wheel-entry-row input {
      flex: 1;
      min-width: 0;
    }

    .wheel-list {
      width: 100%;
      min-height: 58px;
      margin-bottom: 6px;
      padding: 4px;
      resize: vertical;
      color: #000;
      background: #fff;
      border-top: 2px solid #404040;
      border-left: 2px solid #404040;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      font: inherit;
      text-transform: none;
    }



    .config-window .window-body {
      display: grid;
      gap: 8px;
    }

    .wheel-config-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .wheel-config-card {
      padding: 7px;
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #404040;
      border-bottom: 2px solid #404040;
    }

    .wheel-config-card h3 {
      margin: 0 0 6px;
      padding: 3px 5px;
      color: #fff;
      background: #000080;
      font-size: 12px;
    }

    .wheel-config-card label {
      display: block;
      margin: 5px 0 3px;
      font-weight: 700;
    }

    .wheel-config-card textarea {
      width: 100%;
      min-height: 68px;
      resize: vertical;
      padding: 4px;
      color: #000;
      background: #fff;
      border-top: 2px solid #404040;
      border-left: 2px solid #404040;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      font: inherit;
      text-transform: none;
    }

    .wheel-wrap {
      position: relative;
      width: 220px;
      max-width: 100%;
      margin: 0 auto 6px;
    }

    #nameWheel {
      width: 220px;
      height: 220px;
      max-width: 100%;
      background: #fff;
      border-radius: 50%;
      border: 2px solid #404040;
      box-shadow: inset 2px 2px 0 #fff, 2px 2px 0 #000;
    }

    .wheel-pointer {
      position: absolute;
      top: 50%;
      right: -2px;
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-right: 18px solid #f00;
      transform: translateY(-50%);
    }

    .wheel-result {
      min-height: 20px;
      padding: 3px 6px;
      background: #fff;
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      font-weight: 700;
    }

    .desktop-taskbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1200;
      display: flex;
      align-items: center;
      gap: 5px;
      min-height: 34px;
      padding: 3px 4px;
      background-color: #c0c0c0;
      border-top: 2px solid #fff;
      box-shadow: inset 0 1px 0 #dfdfdf;
    }

    .start-button {
      min-width: 74px;
      min-height: 27px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 9px 2px 6px;
      font-size: 13px;
      font-weight: 700;
      text-transform: none;
    }

    .start-button::before {
      content: "";
      width: 18px;
      height: 17px;
      display: inline-block;
      background:
        linear-gradient(135deg, transparent 0 12%, #000 12% 18%, transparent 18%),
        linear-gradient(90deg, #f00 0 48%, transparent 48% 52%, #0a0 52% 100%),
        linear-gradient(90deg, #00f 0 48%, transparent 48% 52%, #ff0 52% 100%);
      background-size: 18px 17px, 18px 8px, 18px 8px;
      background-position: 0 0, 0 1px, 0 9px;
      background-repeat: no-repeat;
      clip-path: polygon(0 12%, 88% 0, 100% 44%, 12% 48%, 12% 56%, 100% 52%, 88% 100%, 0 88%);
      image-rendering: pixelated;
    }

    .taskbar-button {
      min-width: 128px;
      max-width: 190px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }

    .taskbar-spacer {
      flex: 1;
    }

    .taskbar-clock {
      min-width: 78px;
      padding: 5px 8px;
      text-align: center;
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
    }

    .start-menu {
      position: fixed;
      left: 4px;
      bottom: 34px;
      z-index: 1300;
      width: min(250px, calc(100vw - 12px));
      display: none;
      background-color: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #404040;
      border-bottom: 2px solid #404040;
      box-shadow: 2px 2px 0 #000;
    }

    .start-menu.open {
      display: block;
    }

    .start-menu-title {
      padding: 7px 9px;
      color: #fff;
      background: linear-gradient(90deg, #000080, #1084d0);
      font-weight: 700;
    }

    .start-menu button {
      width: 100%;
      min-height: 31px;
      display: block;
      text-align: left;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .start-menu button:hover {
      color: #fff;
      background-color: #000080;
    }

    @media (max-width: 768px) {
      body {
        padding: 8px 8px 46px;
      }

      .desktop-shell {
        width: 100%;
        margin: 0;
      }

      .window-body {
        padding: 6px;
      }

      .app-header {
        justify-content: flex-start;
      }

      .form-row,
      .second-row,
      .left-group,
      .right-group,
      form {
        flex-direction: column;
        align-items: stretch;
      }

      input,
      select,
      button,
      input[type="search"] {
        width: 100%;
        min-width: 0;
      }

      .status-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .window-titlebar {
        font-size: 11px;
      }



      .wheel-config-grid {
        grid-template-columns: 1fr;
      }

      .taskbar-button {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="stella-popup" id="stellaPopup" aria-hidden="true"><img src="stella-blue-sign.png" class="stella-art" alt="" /></div>

  <main class="desktop-shell">
    <section class="desktop-window" data-window-id="gauntlet" data-window-title="THE YAK GAUNTLET">
      <div class="window-titlebar">
        <span class="titlebar-label"><span class="window-icon"></span>THE YAK GAUNTLET</span>
        <div class="window-controls">
          <button type="button" class="window-control" data-window-action="minimize" aria-label="Minimize">_</button>
          <button type="button" class="window-control" data-window-action="maximize" aria-label="Maximize">□</button>
          <button type="button" class="window-control" data-window-action="close" aria-label="Close">×</button>
        </div>
      </div>
      <div class="window-body">

        <div class="controls-wrapper">
          <!-- First row: form centered -->
          <div class="controls-row form-row">
            <form id="entryForm">
              <input id="name" placeholder="Name" required />
              <select id="division" required>
                <option value="" disabled selected>Select Division</option>
              </select>
              <select id="category" required>
                <option value="" disabled selected>Select Category</option>
              </select>
              <input id="time" placeholder="Time (mm ss.ss)" required />
              <input id="date" type="date" required />
              <button type="submit">Submit</button>
            </form>
          </div>

          <!-- Second row: filters left, controls right -->
          <div class="controls-row second-row">
            <div class="left-group">
              <div class="filter-group">
                <label for="divisionFilter">Division</label>
                <select id="divisionFilter"><option value="All">All</option></select>
              </div>
              <div class="filter-group">
                <label for="categoryFilter">Category</label>
                <select id="categoryFilter"><option value="All">All</option></select>
              </div>
              <button id="unfilterButton" class="unfilter-button">Unfilter</button>
              <button id="barstoolButton" class="audience-button">Barstool</button>
              <button id="guestsButton" class="audience-button">Guests</button>
            </div>

            <div class="right-group">
              <input id="searchInput" type="search" placeholder="Search name" />
              <button id="editButton" class="edit-button">Edit</button>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const startButton = document.getElementById('startButton');

    let activeZ = 30;

    function randomizeStellaPosition() {
      if (!stellaPopup) return;
      const popupWidth = stellaPopup.offsetWidth || 210;
      const startRect = startButton ? startButton.getBoundingClientRect() : { left: 4, top: window.innerHeight - 38, width: 70 };
      const menuRect = startMenu && startMenu.classList.contains('open')
        ? startMenu.getBoundingClientRect()
        : startRect;
      const minLeft = Math.max(4, menuRect.left - 18);
      const maxLeft = Math.max(minLeft, Math.min(window.innerWidth - popupWidth - 4, menuRect.left + Math.max(menuRect.width, startRect.width) - 58));
      stellaPopup.style.left = `${minLeft + Math.random() * (maxLeft - minLeft)}px`;
      stellaPopup.style.top = 'auto';
      stellaPopup.style.bottom = '22px';
    }

    function scheduleStellaPopup() {
      const delay = 4500 + Math.random() * 11000;
      window.setTimeout(() => {
        if (stellaPopup) {
          randomizeStellaPosition();
          stellaPopup.classList.add('show');
          window.setTimeout(() => {
            stellaPopup.classList.remove('show');
            scheduleStellaPopup();
          }, 4400 + Math.random() * 1200);
        }
      }, delay);
    }

    function bringWindowToFront(win) {
      activeZ += 1;
      win.style.zIndex = activeZ;
    }

    function restoreWindow(id) {
      const win = document.querySelector(`[data-window-id="${id}"]`);
      if (!win) return;
      win.classList.remove('minimized');
      bringWindowToFront(win);
      startMenu.classList.remove('open');
    }

    function updateClock() {
      const now = new Date();
      taskbarClock.textContent = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }

    function startDrag(event, win) {
      if (event.button !== 0 || event.target.closest('.window-controls') || win.classList.contains('maximized')) return;
      const rect = win.getBoundingClientRect();
      const offsetX = event.clientX - rect.left;
      const offsetY = event.clientY - rect.top;
      win.style.position = 'fixed';
      win.style.left = `${rect.left}px`;
      win.style.top = `${rect.top}px`;
      win.style.width = `${rect.width}px`;
      win.classList.add('detached');
      bringWindowToFront(win);
      win.classList.add('is-dragging');

      function moveWindow(moveEvent) {
        const maxLeft = window.innerWidth - 80;
        const maxTop = window.innerHeight - 70;
        const nextLeft = Math.max(0, Math.min(maxLeft, moveEvent.clientX - offsetX));
        const nextTop = Math.max(0, Math.min(maxTop, moveEvent.clientY - offsetY));
        win.style.left = `${nextLeft}px`;
        win.style.top = `${nextTop}px`;
      }

      function stopDrag() {
        win.classList.remove('is-dragging');
        document.removeEventListener('mousemove', moveWindow);
        document.removeEventListener('mouseup', stopDrag);
      }

      document.addEventListener('mousemove', moveWindow);
      document.addEventListener('mouseup', stopDrag);
    }

    function toggleMaximize(win) {
      bringWindowToFront(win);
      if (win.classList.contains('maximized')) {
        win.classList.remove('maximized');
        win.style.left = win.dataset.restoreLeft || '';
        win.style.top = win.dataset.restoreTop || '';
        win.style.width = win.dataset.restoreWidth || '';
        win.style.position = win.dataset.restorePosition || '';
        if (!win.style.position) win.classList.remove('detached');
      } else {
        const rect = win.getBoundingClientRect();
        win.dataset.restoreLeft = win.style.left || `${rect.left}px`;
        win.dataset.restoreTop = win.style.top || `${rect.top}px`;
        win.dataset.restoreWidth = win.style.width || `${rect.width}px`;
        win.dataset.restorePosition = win.style.position || '';
        win.classList.add('maximized');
      }
    }

    desktopWindows.forEach(win => {

   let lastSubmittedTime = null;

    function normalizeDivision(value) {
      return String(value || '').trim().toUpperCase();
    }

    function updateAudienceButtons() {
      barstoolButton.classList.toggle('active', audienceFilter === 'Barstool');
      guestsButton.classList.toggle('active', audienceFilter === 'Guests');
    }

      if (audienceFilter === 'Barstool') return division === 'BARSTOOL';

    function formatDate(input) {
      const d = new Date(input);
      return `${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}/${d.getFullYear()}`;
    }

    function parseTimeToSeconds(timeStr) {
      const parts = timeStr.trim().split(" ");
      if (parts.length !== 2) return NaN;
      const [min, sec] = parts.map(parseFloat);
      return min * 60 + sec;
    }

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = (seconds % 60).toFixed(2).padStart(5, '0');
      return `${String(min).padStart(2,'0')} ${sec}`;
    }

    function getDaysSince(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diffTime = now - date;
      return Math.floor(diffTime / (1000 * 60 * 60 * 24));
    }

    function escapeHTML(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function rankInGroup(entry, group) {
      const sorted = group
        .filter(item => !isNaN(item.totalSeconds))
        .sort((a, b) => a.totalSeconds - b.totalSeconds);
      return sorted.findIndex(item => item.id === entry.id) + 1;
    }

    function sameMonth(a, b) {
      const first = new Date(a);
      const second = new Date(b);
      return first.getFullYear() === second.getFullYear() && first.getMonth() === second.getMonth();
    }

    function formatRank(rank, total) {
      return rank > 0 ? `${rank} / ${total}` : '--';
    }


    function pct(value, total) {
      if (!total || total <= 0) return 0;
      return Math.max(0, Math.min(100, Math.round((value / total) * 100)));
    }

    function statBar(label, value, total) {
      const width = pct(value, total);
      return `
        <div class="stat-bar-row">
          <span>${label}</span>
          <div class="stat-bar-track"><div class="stat-bar-fill" style="width: ${width}%"></div></div>
          <strong>${escapeHTML(value)} / ${escapeHTML(total)}</strong>
        </div>
      `;
    }

    function percentileBar(value) {
      return `
        <div class="stat-bar-row">
          <span>Percentile</span>
          <div class="stat-bar-track"><div class="stat-bar-fill" style="width: ${value}%"></div></div>
          <strong>${value}%</strong>
        </div>
      `;
    }

    function cloneDefaultWheelConfig() {
      return JSON.parse(JSON.stringify(defaultWheelConfig));
    }

    function parseWheelList(value) {
      return String(value || '').split(/\r?\n/).map(item => item.trim()).filter(Boolean);
    }

    function loadWheelConfig() {
      const fallback = cloneDefaultWheelConfig();
      try {
        const saved = JSON.parse(localStorage.getItem(wheelConfigStorageKey));
        if (!saved) return fallback;
        Object.keys(fallback).forEach(key => {
          fallback[key].rewards = Array.isArray(saved[key]?.rewards) ? saved[key].rewards : fallback[key].rewards;
          fallback[key].punishments = Array.isArray(saved[key]?.punishments) ? saved[key].punishments : fallback[key].punishments;
        });
      } catch (error) {
        console.warn('Wheel config reset:', error);
      }
      return fallback;
    }

    function saveWheelConfig() {
      localStorage.setItem(wheelConfigStorageKey, JSON.stringify(wheelConfig));
    }


    function cleanWheelItem(text) {
      return String(text || '').replace(/^(reward|punishment):\s*/i, '').trim();
    }

    function getConfiguredWheelEntries(key = activeWheelQuartile) {
      const config = wheelConfig[key] || wheelConfig.q25;
      return [
        ...config.rewards.map(cleanWheelItem),
        ...config.punishments.map(cleanWheelItem)
      ];
    }

    function getQuartileKey(percentile) {
      if (percentile < 25) return 'q25';
      if (percentile < 50) return 'q50';
      if (percentile < 75) return 'q75';
      return 'q100';
    }

    function renderWheelConfigInputs() {
      wheelConfigInputs.forEach(input => {
        const [key, type] = input.dataset.wheelConfig.split('.');
        input.value = (wheelConfig[key]?.[type] || []).join('\n');
      });
    }

    function updateWheelConfigFromInput(input) {
      const [key, type] = input.dataset.wheelConfig.split('.');
      if (!wheelConfig[key]) return;
      wheelConfig[key][type] = parseWheelList(input.value);
      saveWheelConfig();
      if (key === activeWheelQuartile) {
        populateWheelFromQuartile(key);
      }
    }

    function setWheelEntries(items) {
      if (!wheelEntries) return;
      wheelEntries.value = items.join('\n');
      wheelRotation = 0;
      drawNameWheel();
    }

    function populateWheelFromQuartile(key) {
      activeWheelQuartile = key;
      setWheelEntries(getConfiguredWheelEntries(key));
      if (wheelResult) wheelResult.textContent = `${wheelConfig[key].label} LOADED`;
    }

    function populateWheelForPercentile(percentile) {
      populateWheelFromQuartile(getQuartileKey(percentile));
    }

    function getWheelNames() {
      const manualNames = wheelEntries ? parseWheelList(wheelEntries.value).map(cleanWheelItem).filter(Boolean) : [];
      return manualNames.length ? manualNames : ['ADD ENTRIES'];
    }

    function initializeWheelEntries() {
      renderWheelConfigInputs();
      populateWheelFromQuartile(activeWheelQuartile);
    }

    function addWheelEntry() {
      if (!wheelEntries || !wheelEntryInput) return;
      const value = wheelEntryInput.value.trim();
      if (!value) return;
      const current = parseWheelList(wheelEntries.value);
      current.push(value);
      setWheelEntries(current);
      wheelEntryInput.value = '';
      if (wheelResult) wheelResult.textContent = 'READY';
    }

    function clearWheelEntries() {
      if (!wheelEntries) return;
      setWheelEntries([]);
      if (wheelResult) wheelResult.textContent = 'READY';
    }


    function wrapWheelText(text, maxChars = 12, maxLines = 3) {
      const words = String(text || '').split(/\s+/).filter(Boolean);
      const lines = [];
      words.forEach(word => {
        const current = lines[lines.length - 1] || '';
        if (!current) {
          lines.push(word);
        } else if (`${current} ${word}`.length <= maxChars) {
          lines[lines.length - 1] = `${current} ${word}`;
        } else if (lines.length < maxLines) {
          lines.push(word);
        } else {
          lines[lines.length - 1] = `${lines[lines.length - 1]} ${word}`;
        }
      });
      if (lines.length > maxLines) lines.length = maxLines;
      const last = lines[lines.length - 1];
      if (last && last.length > maxChars + 3) {
        lines[lines.length - 1] = `${last.slice(0, maxChars + 1).trim()}...`;
      }
      return lines.length ? lines : [''];
    }

    function drawWheelLabel(ctx, name, radius, slice) {
      const lines = wrapWheelText(name, slice < 0.55 ? 9 : 12, slice < 0.45 ? 2 : 3);
      const fontSize = slice < 0.45 ? 8 : 9;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#000';
      ctx.font = `bold ${fontSize}px "MS Sans Serif", Tahoma, Arial`;
      const distance = Math.max(44, radius * 0.63);
      const lineHeight = fontSize + 1;
      lines.forEach((line, lineIndex) => {
        ctx.fillText(line, distance, (lineIndex - (lines.length - 1) / 2) * lineHeight);
      });
    }

    function drawNameWheel(rotation = wheelRotation) {
      if (!nameWheel) return;
      const ctx = nameWheel.getContext('2d');
      const names = getWheelNames();
      const colors = ['#ff4040', '#4080ff', '#ffe14d', '#40b060', '#d070ff', '#ff9a3d', '#5bd6d6', '#f070a8'];
      const cx = nameWheel.width / 2;
      const cy = nameWheel.height / 2;
      const radius = Math.min(cx, cy) - 4;
      const slice = (Math.PI * 2) / names.length;

      ctx.clearRect(0, 0, nameWheel.width, nameWheel.height);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);

      names.forEach((name, index) => {
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, index * slice, (index + 1) * slice);
        ctx.closePath();
        ctx.fillStyle = colors[index % colors.length];
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.stroke();

        ctx.save();
        ctx.rotate(index * slice + slice / 2);
        drawWheelLabel(ctx, name, radius, slice);
        ctx.restore();
      });

      ctx.restore();
      ctx.beginPath();
      ctx.arc(cx, cy, 10, 0, Math.PI * 2);
      ctx.fillStyle = '#c0c0c0';
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.stroke();
    }

    function spinNameWheel() {
      if (wheelSpinning || !nameWheel) return;
      const names = getWheelNames().filter(name => name !== 'ADD ENTRIES');
      if (!names.length) {
        if (wheelResult) wheelResult.textContent = 'ADD ENTRIES';
        drawNameWheel();
        return;
      }

      wheelSpinning = true;
      if (wheelResult) wheelResult.textContent = 'SPINNING...';
      const winnerIndex = Math.floor(Math.random() * names.length);
      const slice = (Math.PI * 2) / names.length;
      const targetAngle = -winnerIndex * slice - slice / 2;
      const start = wheelRotation;
      const finish = targetAngle + Math.PI * 2 * (5 + Math.floor(Math.random() * 3));
      const duration = 3200;
      const startedAt = performance.now();

      function animate(now) {
        const t = Math.min(1, (now - startedAt) / duration);
        const eased = 1 - Math.pow(1 - t, 3);
        wheelRotation = start + (finish - start) * eased;
        drawNameWheel(wheelRotation);
        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          wheelRotation = targetAngle % (Math.PI * 2);
          drawNameWheel(wheelRotation);
          if (wheelResult) wheelResult.textContent = names[winnerIndex];
          wheelSpinning = false;
        }
      }

      requestAnimationFrame(animate);
    }
function showRunStats(entryId) {
      const entry = entries.find(item => item.id === entryId);
      if (!entry || !runStatsContent) return;

      entries.forEach(item => {
        item.totalSeconds = parseTimeToSeconds(item.time);
      });

      const validEntries = entries.filter(item => !isNaN(item.totalSeconds));
      const overallRank = rankInGroup(entry, validEntries);
      const divisionEntries = validEntries.filter(item => item.division === entry.division);
      const categoryEntries = validEntries.filter(item => item.category === entry.category);
      const monthlyEntries = validEntries.filter(item => sameMonth(item.date, entry.date));
      const percentile = overallRank > 0 && validEntries.length > 1
        ? Math.round(((overallRank - 1) / (validEntries.length - 1)) * 100)
        : 0;

      runStatsContent.innerHTML = `
        <strong>${escapeHTML(entry.name)}</strong>
        ${percentileBar(percentile)}
        ${statBar('Overall Rank', overallRank, validEntries.length)}
        ${statBar('Division Rank', rankInGroup(entry, divisionEntries), divisionEntries.length)}
        ${statBar('Monthly Rank', rankInGroup(entry, monthlyEntries), monthlyEntries.length)}
      `;

      const statsWindow = document.querySelector('[data-window-id="runStats"]');
      if (statsWindow) {
        statsWindow.classList.remove('minimized', 'maximized');
        statsWindow.classList.add('detached');
        statsWindow.style.position = 'fixed';
        statsWindow.style.width = '360px';
        statsWindow.style.left = `${Math.max(8, window.innerWidth - 376)}px`;
        statsWindow.style.top = '86px';
        bringWindowToFront(statsWindow);
        populateWheelForPercentile(percentile);
      }
    }

    function updateFilterOptions() {
      const divisions = [...new Set(entries.map(e => e.division))].sort();
      const categories = [...new Set(entries.map(e => e.category))].sort();

      divisionFilter.innerHTML = '<option value="All">All</option>' +
        divisions.map(d => `<option value="${d}">${d}</option>`).join('');
      categoryFilter.innerHTML = '<option value="All">All</option>' +
        categories.map(c => `<option value="${c}">${c}</option>`).join('');

      divisionSelect.innerHTML = '<option value="" disabled selected>Select Division</option>' +
        divisions.map(d => `<option value="${d}">${d}</option>`).join('') +
        '<option value="__add_new__">+ Add New Division</option>';
      categorySelect.innerHTML = '<option value="" disabled selected>Select Category</option>' +
        categories.map(c => `<option value="${c}">${c}</option>`).join('') +
        '<option value="__add_new__">+ Add New Category</option>';
    }

    function compareEntries(a, b, column) {
      switch (column) {
        case 'rank':
        case 'time':
          // sort by totalSeconds
          return a.totalSeconds - b.totalSeconds;
        case 'name':
          return a.name.localeCompare(b.name);
        case 'division':
          return a.division.localeCompare(b.division);
        case 'category':
          return a.category.localeCompare(b.category);
        case 'date':
          return new Date(a.date) - new Date(b.date);
        default:
          return 0;
      }
    }

    async function renderScoreboard() {
      scoreboard.innerHTML = '';

      // Calculate totalSeconds for sorting & finding leaders
      entries.forEach(entry => {
        entry.totalSeconds = parseTimeToSeconds(entry.time);
      });

      // Find best overall and division leaders from all entries (unfiltered)
      let bestOverall = null;
      const bestByDivision = {};
      entries.forEach(entry => {
        if (!bestOverall || entry.totalSeconds < bestOverall.totalSeconds) bestOverall = entry;
        if (!bestByDivision[entry.division] || entry.totalSeconds < bestByDivision[entry.division].totalSeconds) {
          bestByDivision[entry.division] = entry;
        }
      });

      // Apply filters and search
      let filteredEntries = entries.filter(entry =>
        entry.name.toUpperCase().includes(searchInput.value.toUpperCase()) &&
        matchesAudienceFilter(entry) &&
        (divisionFilter.value === 'All' || entry.division === divisionFilter.value) &&
        (categoryFilter.value === 'All' || entry.category === categoryFilter.value)
      );

      // Sort filtered entries by current sort column and direction
      filteredEntries.sort((a, b) => {
        let cmp = compareEntries(a, b, currentSort.column);
        return currentSort.direction === 'asc' ? cmp : -cmp;
      });

      // Add sorted-asc/desc classes to headers
      document.querySelectorAll('th.sortable').forEach(th => {
        th.classList.remove('sorted-asc', 'sorted-desc');
        if (th.dataset.column === currentSort.column) {
          th.classList.add(currentSort.direction === 'asc' ? 'sorted-asc' : 'sorted-desc');
        }
      });

      const todayStr = new Date().toISOString().split('T')[0];

      const quartileMarkers = [
        { index: Math.ceil(filteredEntries.length * 0.25), label: '25% Mark' },
        { index: Math.ceil(filteredEntries.length * 0.50), label: '50% Mark' },
        { index: Math.ceil(filteredEntries.length * 0.75), label: '75% Mark' },
      ].filter(marker => marker.index > 0 && marker.index < filteredEntries.length);

      filteredEntries.forEach((entry, index) => {
        quartileMarkers
          .filter(marker => marker.index === index)
          .forEach(marker => {
            const markerRow = document.createElement('tr');
            markerRow.className = 'quartile-row';
            markerRow.innerHTML = `<td colspan="${isEditMode ? 7 : 6}">${marker.label}</td>`;
            scoreboard.appendChild(markerRow);
          });

        const row = document.createElement('tr');
        row.dataset.entryId = entry.id;

        const entryDateOnly = new Date(entry.date).toISOString().split('T')[0];
        const isToday = entryDateOnly === todayStr;
        const isLeader = entry === bestOverall;
        const isDivisionLeader = bestByDivision[entry.division] === entry;

        if (isLeader) row.classList.add('leader');
        else if (isDivisionLeader) row.classList.add('division-leader');
        if (isToday) row.classList.add('today-entry');

        const daysSince = getDaysSince(entry.date);
        let iconHTML = '';

        if (isLeader) iconHTML = `<span class="stopwatch gold" title="Days since: ${daysSince}">🥇${daysSince} days</span>`;
        else if (isDivisionLeader) iconHTML = `<span class="stopwatch blue" title="Days since: ${daysSince}">⏱️${daysSince} days</span>`;

        row.innerHTML = `
          <td>${index + 1}</td>
          <td contenteditable="${isEditMode}">${entry.name}</td>
          <td contenteditable="${isEditMode}">${entry.division}</td>
          <td contenteditable="${isEditMode}">${entry.category}</td>
          <td contenteditable="${isEditMode}">${formatTime(entry.totalSeconds)} ${iconHTML}</td>
          <td contenteditable="${isEditMode}">${formatDate(entry.date)}</td>
          <td style="display: ${isEditMode ? 'table-cell' : 'none'}">
            <button class="delete-button" data-id="${entry.id}">Delete</button>
          </td>
        `;
        scoreboard.appendChild(row);
      });

      updateFilterOptions();

if (lastSubmittedTime !== null) {
  try {
    const rows = scoreboard.querySelectorAll('tr');
    for (const row of rows) {
      const timeCell = row.cells[4];
      if (!timeCell) continue;

      const parts = timeCell.textContent.trim().split(' ');
      if (parts.length < 2) continue;

      const timeText = parts[0] + ' ' + parts[1]; // "mm ss.ss"
      const timeInRow = parseTimeToSeconds(timeText);
      if (isNaN(timeInRow)) continue;

      if (Math.abs(timeInRow - lastSubmittedTime) < 0.01) {
        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        row.style.backgroundColor = '#ffffaa';
        setTimeout(() => row.style.backgroundColor = '', 1500);
        break;
      }
    }
  } catch (err) {
    console.error("Scroll logic failed:", err);
  }
  lastSubmittedTime = null;
}

document.querySelectorAll('.delete-button').forEach(button => {
  button.addEventListener('click', (e) => {
    const entryId = e.target.dataset.id;
    deleteEntry(entryId);
  });
});

      document.querySelectorAll('.delete-button').forEach(button => {
        button.addEventListener('click', (e) => {
          const entryId = e.target.dataset.id;
          deleteEntry(entryId);
        });
      });

    async function fetchEntries() {
      const snapshot = await entriesCollection.get();
      entries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      drawNameWheel();
      renderScoreboard();
      if (pendingStatsEntryId) {
        showRunStats(pendingStatsEntryId);
        pendingStatsEntryId = null;
      }
    }

    async function addEntry(entry) {
      const docRef = await entriesCollection.add(entry);
      pendingStatsEntryId = docRef.id;
      await fetchEntries();
    }

    async function deleteEntry(id) {
      if (confirm("Delete this entry?")) {
        await entriesCollection.doc(id).delete();
        fetchEntries();
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const division = divisionSelect.value;
      const category = categorySelect.value;
      const time = document.getElementById('time').value.trim();
      const dateInput = document.getElementById('date').value; // e.g. "2025-05-29"

      if (!name || !division || !category || !time || !dateInput) {
        alert("Please fill in all fields.");
        return;
      }

      // Extract year, month, day from the dateInput string
      const [year, month, day] = dateInput.split('-').map(Number);

      // Get current time components
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();
      const milliseconds = now.getMilliseconds();

      // Create a Date object with local time on selected day + current time
      const combinedDate = new Date(year, month - 1, day, hours, minutes, seconds, milliseconds);

      // Convert to ISO string for Firestore (UTC)
      const dateTimeString = combinedDate.toISOString();

      lastSubmittedTime = parseTimeToSeconds(time);
      await addEntry({ name, division, category, time, date: dateTimeString });

      form.reset();
    });

    // 🔐 Password-protected edit toggle
    editButton.addEventListener('click', () => {
      if (!isEditMode) {
        const input = prompt("Enter edit password:");
        if (input !== editPassword) {
          alert("Incorrect password.");
          return;
        }
      }
      isEditMode = !isEditMode;
      editButton.textContent = isEditMode ? "Done" : "Edit";
      if (isEditMode) {
        const saveButton = document.createElement('button');
        saveButton.textContent = 'Save Changes';
        saveButton.id = 'saveChangesButton';
        saveButton.className = 'edit-button';
        editButton.after(saveButton);

        saveButton.addEventListener('click', async () => {
          const rows = [...scoreboard.querySelectorAll('tr')].filter(row => row.dataset.entryId);
          for (let index = 0; index < rows.length; index++) {
            const row = rows[index];
            const entry = entries.find(item => item.id === row.dataset.entryId);
            if (!entry) continue;
            const cells = row.querySelectorAll('td');
            const newName = cells[1].innerText.trim();
            const newDivision = cells[2].innerText.trim();
            const newCategory = cells[3].innerText.trim();
            const newTime = cells[4].innerText.trim().split(' ')[0] + ' ' + cells[4].innerText.trim().split(' ')[1]; // "mm ss.ss"
            const newDateText = cells[5].innerText.trim();
            // Parse mm/dd/yyyy to yyyy-mm-dd
            const [m, d, y] = newDateText.split('/');
            const newDate = new Date(y, m - 1, d).toISOString();

            await entriesCollection.doc(entry.id).update({
              name: newName,
              division: newDivision,
              category: newCategory,
              time: newTime,
              date: newDate,
            });
          }
          alert('Changes saved.');
          fetchEntries();
          isEditMode = false;
          editButton.textContent = "Edit";
          saveButton.remove();
        });
      } else {
        const saveButton = document.getElementById('saveChangesButton');
        if (saveButton) saveButton.remove();
      }
      renderScoreboard();
    });


    function handleAddNewOption(select, label) {
      if (select.value !== '__add_new__') return;
      const newValue = prompt(`Enter new ${label}:`);
      if (newValue && newValue.trim()) {
        const cleanValue = newValue.trim();
        const option = document.createElement('option');
        option.value = cleanValue;
        option.textContent = cleanValue;
        select.insertBefore(option, select.querySelector('option[value="__add_new__"]'));
        select.value = cleanValue;
      } else {
        select.value = '';
      }
    }

    divisionSelect.addEventListener('change', () => handleAddNewOption(divisionSelect, 'division'));
    categorySelect.addEventListener('change', () => handleAddNewOption(categorySelect, 'category'));

    unfilterButton.addEventListener('click', () => {
      divisionFilter.value = 'All';
      categoryFilter.value = 'All';
      searchInput.value = '';
      audienceFilter = 'All';
      updateAudienceButtons();
      renderScoreboard();
    });

    barstoolButton.addEventListener('click', () => {
      audienceFilter = 'Barstool';
      divisionFilter.value = 'All';
      updateAudienceButtons();
      renderScoreboard();
    });

    guestsButton.addEventListener('click', () => {
      audienceFilter = 'Guests';
      divisionFilter.value = 'All';
      updateAudienceButtons();
      renderScoreboard();
    });

    openStatsButton.addEventListener('click', () => {
      window.open('stats.html', '_blank');
    });

    divisionFilter.addEventListener('change', () => {
      audienceFilter = 'All';
      updateAudienceButtons();
      renderScoreboard();
    });
    categoryFilter.addEventListener('change', renderScoreboard);
    searchInput.addEventListener('input', renderScoreboard);

    // Add sorting on header click
    document.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.column;
        if (currentSort.column === col) {
          currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
        } else {
          currentSort.column = col;
          currentSort.direction = 'asc';
        }
        renderScoreboard();
      });
    });

    initializeWheelEntries();
    drawNameWheel();
    if (spinWheelButton) spinWheelButton.addEventListener('click', spinNameWheel);
    if (addWheelEntryButton) addWheelEntryButton.addEventListener('click', addWheelEntry);
    if (clearWheelEntriesButton) clearWheelEntriesButton.addEventListener('click', clearWheelEntries);
    if (wheelEntryInput) {
      wheelEntryInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
          event.preventDefault();
          addWheelEntry();
        }
      });
    }
    if (wheelEntries) wheelEntries.addEventListener('input', () => {
      wheelRotation = 0;
      drawNameWheel();
    });
    wheelConfigInputs.forEach(input => {
      input.addEventListener('input', () => updateWheelConfigFromInput(input));
    });

    fetchEntries();
  });
