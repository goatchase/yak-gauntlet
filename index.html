<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: light;
  --bg:#f8fafd;
  --surface:#ffffff;
  --surface-soft:#f8fafd;
  --ink:#202124;
  --muted:#5f6368;
  --line:#dfe3e7;
  --line-strong:#c9d0d6;
  --blue:#1a73e8;
  --blue-soft:#d3e3fd;
  --green:#188038;
  --green-soft:#ceead6;
  --yellow:#fbbc04;
  --yellow-soft:#feefc3;
  --red:#d93025;
  --red-soft:#fad2cf;
  --gray-soft:#e8eaed;
  --radius:16px;
  --rail:168px;
  --gap:16px;
  --font:Roboto, Arial, Helvetica, "Segoe UI", sans-serif;
}
* { box-sizing:border-box; }
html, body { min-height:100%; }
body {
  margin:0;
  min-height:100vh;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font);
  font-size:10pt;
  font-weight:400;
  letter-spacing:0;
}
button, input, select, textarea, table {
  font-family:var(--font);
  font-size:10pt;
  letter-spacing:0;
}
button { cursor:pointer; }
input, select, textarea {
  min-width:0;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  color:var(--ink);
  min-height:32px;
  padding:5px 8px;
  outline:0;
}
input:focus, select:focus, textarea:focus {
  border-color:#9bbcff;
  box-shadow:0 0 0 2px rgba(26,115,232,.12);
}
input[type="number"] {
  appearance:textfield;
  -moz-appearance:textfield;
  text-align:center;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
textarea { resize:vertical; line-height:1.3; }
.btn, .icon-btn, .panel-add, .mini-action {
  border:1px solid var(--line);
  background:#fff;
  color:var(--ink);
  border-radius:999px;
  min-height:32px;
  padding:5px 12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  box-shadow:none;
}
.btn:hover, .icon-btn:hover, .panel-add:hover, .mini-action:hover { background:#f1f3f4; }
.btn.primary { background:var(--blue); border-color:var(--blue); color:#fff; }
.btn.danger, .mini-action.delete, .remove-category, .remove-member { color:var(--red); }
.icon-btn, .panel-add, .mini-action { width:30px; min-width:30px; padding:0; }
.empty-state, .summary-empty { color:var(--muted); padding:18px; text-align:center; }

.auth-screen {
  min-height:100vh;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
}
.auth-card {
  width:min(420px, 100%);
  background:#fff;
  border:1px solid var(--line);
  border-radius:24px;
  padding:22px;
  display:grid;
  gap:12px;
}
.modal-title, .family-tasks-head h3 {
  margin:0;
  font-size:13pt;
  line-height:1.2;
  font-weight:700;
  color:var(--ink);
}
.field, .setup-field, .settings-row {
  display:grid;
  gap:5px;
  color:var(--muted);
  font-weight:700;
}
.setup-check { display:flex; align-items:center; gap:8px; color:var(--ink); }
.modal-actions { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; align-items:center; }

.site-container {
  width:100%;
  min-height:100vh;
  display:grid;
  grid-template-columns:var(--rail) minmax(0,1fr);
  background:var(--bg);
}
.top-bar {
  grid-column:1;
  grid-row:1;
  position:sticky;
  top:0;
  min-height:100vh;
  height:100vh;
  overflow-y:auto;
  background:#fff;
  border-right:1px solid var(--line);
  padding:10px 10px 14px;
  display:grid;
  align-content:start;
  gap:12px;
  z-index:1000;
}
.top-controls {
  display:grid;
  grid-template-columns:36px minmax(0,1fr);
  gap:8px;
  align-items:center;
}
.menu-wrap { position:relative; overflow:visible; z-index:5000; }
.menu-button {
  width:36px;
  min-width:36px;
  height:36px;
  min-height:36px;
  border:0;
  background:transparent;
  padding:0;
  display:grid;
  place-items:center;
  gap:0;
}
.menu-button span {
  width:18px;
  height:2px;
  background:#3c4043;
  border-radius:2px;
  display:block;
  margin:2px 0;
}
.top-controls select, #week-select {
  width:100%;
  height:36px;
  min-height:36px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  padding:5px 26px 5px 10px;
  background:#fff;
  font-weight:700;
}
.overflow-menu {
  display:none;
  position:absolute;
  top:42px;
  left:0;
  min-width:190px;
  padding:6px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
  box-shadow:0 12px 28px rgba(60,64,67,.18);
  z-index:10000;
}
.overflow-menu.open { display:grid; gap:2px; }
.menu-item {
  border:0;
  background:transparent;
  color:var(--ink);
  min-height:34px;
  border-radius:10px;
  padding:7px 10px;
  text-align:left;
  font-weight:400;
}
.overflow-menu > .menu-item { font-weight:700; }
.menu-item:hover { background:#f1f3f4; }
.menu-section {
  display:none;
  position:static;
  padding-left:10px;
  border-left:2px solid var(--line);
}
.menu-section.open { display:grid; gap:2px; }
.menu-item.danger { color:var(--red); }

.tab-container {
  display:grid;
  grid-template-columns:1fr;
  gap:6px;
}
.tab {
  width:100%;
  min-height:34px;
  border:0;
  border-radius:999px;
  background:transparent;
  color:var(--ink);
  padding:5px 8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  text-align:left;
}
.tab:hover { background:#f1f3f4; }
.tab.active { background:var(--blue-soft); color:#041e49; }
.kid-name {
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:12pt;
  font-weight:700;
}
.rank-circle, .filter-count, .goal-percent {
  min-width:24px;
  height:20px;
  padding:0 7px;
  border-radius:999px;
  background:#f1f3f4;
  color:var(--muted);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:9pt;
  font-weight:700;
  white-space:nowrap;
}

#kid-views, #screen-view {
  grid-column:2;
  grid-row:1;
  min-width:0;
  padding:14px 16px;
}
.screen-view { display:none; }
.screen-view.active { display:block; }
body.subpage-active #kid-tabs, body.subpage-active #kid-views { display:none !important; }
body:not(.subpage-active) #screen-view, body:not(.subpage-active) #screen-content { display:none !important; }
.screen-bar {
  min-height:38px;
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}
#screen-back { border-color:var(--line); background:#fff; }
#screen-title { font-size:12pt; font-weight:700; }
#screen-content > .modal-content {
  width:100%;
  max-width:none;
  max-height:none;
  overflow:visible;
  border:0;
  border-radius:0;
  box-shadow:none;
  background:transparent;
  padding:0;
}

.table-container { display:none; }
.table-container.active { display:block; }
.tracker-workspace {
  display:grid;
  grid-template-columns:minmax(620px, 940px) minmax(300px, 380px);
  gap:16px;
  align-items:start;
}
.tracker-card, .panel, .family-tasks-card, .summary-table-wrap, .category-editor, .goal-band-editor, .household-content .household-main {
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:none;
}
.tracker-card { overflow:hidden; }
.table-scroll { width:100%; overflow:auto; }
table {
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
}
th, td {
  height:34px;
  min-height:34px;
  padding:4px 5px;
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  text-align:center;
  vertical-align:middle;
  background:#fff;
  overflow:hidden;
}
th:last-child, td:last-child { border-right:0; }
thead th {
  position:sticky;
  top:0;
  z-index:4;
  color:var(--muted);
  font-weight:700;
  background:#fff;
}
th:first-child, td:first-child {
  width:128px;
  min-width:128px;
  max-width:128px;
  text-align:left;
  position:sticky;
  left:0;
  z-index:3;
}
thead th:first-child { z-index:6; }
tbody tr.group-start > td { border-top:2px solid var(--line-strong); }
tbody tr.total-row > td {
  border-top:2px solid var(--line-strong);
  font-weight:700;
}
.day-head {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  min-height:24px;
  position:relative;
}
.day-short { display:none; }
th.current-day .day-head { color:var(--blue); font-weight:700; }
.note-dots { display:inline-flex; gap:2px; min-width:8px; }
.note-dot { width:5px; height:5px; border-radius:999px; }
.note-dot.good { background:var(--green); }
.note-dot.bad { background:var(--red); }
.category-label {
  width:100%;
  border:0;
  background:transparent;
  color:var(--ink);
  padding:0;
  text-align:left;
  min-height:26px;
}
.category-label:hover { color:var(--blue); }
.category-label:focus, .category-label:active { background:transparent; box-shadow:none; }
.category-name { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
td input[type="number"] {
  width:44px;
  height:24px;
  min-height:24px;
  border-radius:999px;
  padding:0 4px;
}
td input[type="checkbox"], .task-toggle {
  appearance:none;
  -webkit-appearance:none;
  width:22px;
  height:14px;
  min-height:14px;
  border:0;
  border-radius:999px;
  background:#dadce0;
  padding:0;
  position:relative;
}
td input[type="checkbox"]::before, .task-toggle::before {
  content:"";
  position:absolute;
  width:10px;
  height:10px;
  border-radius:999px;
  left:2px;
  top:2px;
  background:#fff;
  transition:left .12s ease;
}
td input[type="checkbox"]:checked { background:var(--blue); }
td input[type="checkbox"]:checked::before, .task-toggle:checked::before { left:10px; }
td input[data-negative="true"]:checked { background:var(--red); }
.goal-progress-cell { width:56px; }
.summary-goal-blue { background:#8ab4f8 !important; color:#041e49 !important; }
.summary-goal-green { background:#81c995 !important; color:#0b3d1a !important; }
.summary-goal-yellow { background:#fde293 !important; color:#5f4600 !important; }
.summary-goal-orange { background:#fdd6a0 !important; color:#6f3700 !important; }
.summary-goal-red { background:#f28b82 !important; color:#601410 !important; }
.summary-goal-gray { background:#e8eaed !important; color:#3c4043 !important; }
.calc-value { color:var(--muted); font-weight:700; }

.work-grid { display:grid; gap:12px; }
.panel { padding:12px; }
.panel-head, .family-tasks-head, .goal-band-head {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
  font-weight:700;
}
.panel-actions { display:flex; gap:6px; }
.entry-row, .log-compose, .family-task-form {
  display:grid;
  gap:8px;
  align-items:center;
  margin-bottom:10px;
}
.entry-row { grid-template-columns:76px minmax(0,1fr) auto; }
.log-compose { grid-template-columns:70px 78px minmax(0,1fr) minmax(0,1fr) auto; }
.entry-row.collapsed, .log-compose.collapsed, .family-task-form.collapsed { display:none; }
.task-list, .log-list { display:grid; gap:6px; }
.task-item, .log-item {
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto auto;
  gap:6px;
  align-items:center;
  min-height:30px;
  padding:5px 0;
  border-bottom:1px solid var(--line);
}
.task-item:last-child, .log-item:last-child { border-bottom:0; }
.day-chip {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:32px;
  height:22px;
  border-radius:999px;
  background:#f1f3f4;
  color:var(--muted);
  font-weight:700;
}
.task-text, .log-copy, .log-outcome { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.log-main { display:flex; align-items:center; gap:6px; min-width:0; }
.log-item.good .day-chip { background:var(--green-soft); color:var(--green); }
.log-item.bad .day-chip { background:var(--red-soft); color:var(--red); }

.modal {
  display:none;
  position:fixed;
  inset:0;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:rgba(32,33,36,.18);
  z-index:2000;
}
.modal-content {
  width:min(900px, 100%);
  max-height:calc(100vh - 40px);
  overflow:auto;
  background:#fff;
  border:1px solid var(--line);
  border-radius:20px;
  padding:16px;
  box-shadow:0 16px 40px rgba(60,64,67,.18);
}
#category-detail-modal { background:transparent; pointer-events:none; }
#category-detail-modal .modal-content { width:min(430px, 92vw); pointer-events:auto; }
.category-detail-form { display:grid; gap:10px; }
.category-detail-meta { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

.category-config-content, .household-content { display:grid; gap:12px; }
.category-config-layout, .household-layout, .family-tasks-app {
  display:grid;
  grid-template-columns:150px minmax(0,1fr);
  gap:16px;
  align-items:start;
}
.category-side, .household-side, .family-tasks-side, .summary-controls {
  display:grid;
  gap:6px;
  align-content:start;
}
.config-nav, .family-filter-pill {
  border:0;
  border-radius:999px;
  min-height:32px;
  background:transparent;
  color:var(--ink);
  text-align:left;
  padding:6px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.config-nav:hover, .family-filter-pill:hover { background:#f1f3f4; }
.config-nav.active, .family-filter-pill.active { background:var(--blue-soft); color:#041e49; }
.family-filter-title, .side-field, .import-bubble { color:var(--muted); font-weight:700; }
.family-filter-title { padding:10px 10px 2px; }
.side-field, .import-bubble {
  display:grid;
  gap:6px;
  padding:8px 10px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
}
.category-screen, .household-screen { display:none; }
.category-screen.active { display:block; }
.household-screen.active { display:grid; gap:10px; }
.category-editor {
  overflow:auto;
  max-height:calc(100vh - 180px);
  border-radius:14px;
}
#category-editor .category-header,
#category-editor .category-row {
  display:grid;
  grid-template-columns:46px 112px 112px 112px 112px 82px 76px 76px 76px 78px 84px 84px;
  min-width:max-content;
  gap:0;
  align-items:stretch;
  border-bottom:1px solid var(--line);
}
#category-editor .category-header {
  position:sticky;
  top:0;
  z-index:5;
  background:#fff;
  color:var(--muted);
  font-weight:700;
}
#category-editor .category-header span,
#category-editor .category-row > * {
  min-width:0;
  min-height:32px;
  height:32px;
  border:0;
  border-right:1px solid var(--line);
  border-radius:0;
  padding:5px 6px;
  background:#fff;
}
#category-editor .category-row > :last-child,
#category-editor .category-header > :last-child { border-right:0; }
#category-editor .category-header span { display:flex; align-items:center; justify-content:center; text-align:center; }
#category-editor .row-tools { display:flex; align-items:center; justify-content:center; gap:2px; padding:0; }
#category-editor .row-tools .drag-handle,
#category-editor .row-tools .remove-category {
  width:20px;
  min-width:20px;
  height:24px;
  min-height:24px;
  border:0;
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}
.drag-handle { cursor:grab; color:var(--muted); user-select:none; }
#category-editor textarea {
  resize:none;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  text-align:center;
}
#member-editor.category-editor { max-height:56vh; }
#member-editor .category-row {
  display:grid;
  grid-template-columns:50px minmax(130px,1fr) 76px 96px 72px 92px 34px;
  gap:0;
  border-bottom:1px solid var(--line);
}
#member-editor .category-row > * { border-radius:0; border:0; border-right:1px solid var(--line); min-height:34px; }
.goal-band-editor { padding:12px; }
.goal-band-row { display:grid; grid-template-columns:120px 120px 34px; gap:8px; align-items:center; margin-top:8px; }

.summary-controls {
  grid-template-columns:repeat(4, minmax(90px, auto)) 1fr auto;
  margin-bottom:12px;
}
.summary-refresh { width:32px; padding:0; }
.summary-table-wrap { overflow:auto; border-radius:14px; }
.summary-table { width:max-content; min-width:100%; }
.summary-table th, .summary-table td { width:72px; min-width:72px; max-width:72px; }
.summary-table th:first-child, .summary-table td:first-child { width:128px; min-width:128px; max-width:128px; }
.summary-table tbody tr.group-start > td { border-top:2px solid var(--line-strong); }

.family-tasks-content { background:transparent !important; border:0 !important; padding:0 !important; }
.family-tasks-card { padding:16px; min-height:calc(100vh - 92px); }
.family-task-form {
  grid-template-columns:120px minmax(180px,1fr) 96px 118px 96px minmax(140px,1fr) auto;
}
.family-task-list {
  display:grid;
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}
.family-task-list:empty { border:0; }
.family-task-row {
  display:grid;
  grid-template-columns:30px minmax(110px,160px) minmax(180px,1fr) 86px 112px 96px 62px;
  min-height:36px;
  border-bottom:1px solid var(--line);
  align-items:stretch;
}
.family-task-row:last-child { border-bottom:0; }
.family-task-row > * {
  min-width:0;
  border:0;
  border-right:1px solid var(--line);
  border-radius:0;
  background:#fff;
  padding:6px 8px;
  display:flex;
  align-items:center;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.family-task-row > :last-child { border-right:0; }
.family-task-header { color:var(--muted); font-weight:700; }
.family-task-cell:focus { background:#f8fbff; box-shadow:inset 0 0 0 1px #9bbcff; }
.family-task-check {
  justify-self:center;
  align-self:center;
  width:16px;
  height:16px;
  min-height:16px;
  border:2px solid var(--muted);
  border-radius:999px;
  background:#fff;
  padding:0;
}
.family-task-status.status-now { background:var(--blue-soft); color:#0b57d0; }
.family-task-status.status-next { background:var(--green-soft); color:var(--green); }
.family-task-status.status-soon { background:var(--yellow-soft); color:#8f4700; }
.family-task-status.status-waiting { background:var(--red-soft); color:#a50e0e; }
.family-task-status.status-parked { background:var(--gray-soft); color:#3c4043; }
.family-task-actions { justify-content:center; gap:4px; }
.note-indicator { border:0; background:transparent; color:var(--muted); width:24px; min-width:24px; padding:0; }
.note-indicator.empty { opacity:.25; }
.family-task-notes { display:none !important; }
.completed-tasks { margin-top:12px; color:var(--muted); }
.completed-tasks summary { min-height:32px; display:flex; align-items:center; gap:6px; cursor:pointer; }

@media (min-width:900px) {
  body.subpage-active #screen-content .summary-controls,
  body.subpage-active #screen-content .category-side,
  body.subpage-active #screen-content .family-tasks-side,
  body.subpage-active #screen-content .household-side {
    position:fixed;
    left:10px;
    top:62px;
    width:148px;
    z-index:50;
  }
  body.subpage-active #screen-content > .modal-content,
  body.subpage-active #screen-content > .category-config-content,
  body.subpage-active #screen-content > .family-tasks-content,
  body.subpage-active #screen-content > .household-content {
    width:100%;
  }
  body.subpage-active .category-config-layout,
  body.subpage-active .household-layout,
  body.subpage-active .family-tasks-app {
    display:block;
  }
  body.subpage-active .category-config-main,
  body.subpage-active .household-main,
  body.subpage-active .family-tasks-main {
    min-width:0;
  }
}

function getYearWeek(date = new Date()) {
  const tmpDate = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = tmpDate.getUTCDay() || 7;
  tmpDate.setUTCDate(tmpDate.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(tmpDate.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((tmpDate - yearStart) / 86400000) + 1) / 7);
  return `${tmpDate.getUTCFullYear()}-W${weekNo}`;
}

    canImportLegacy = false;
  }
  if (row) row.style.display = canImportLegacy ? "flex" : "none";
}

function friendlyFirebaseError(error, fallback = "Something went wrong.") {
  const code = error?.code || "";
  if (code === "auth/email-already-in-use") return "That email already has an account. Use Sign In.";
  if (code === "auth/invalid-email") return "Enter a valid email address.";
  if (code === "auth/weak-password") return "Use a password with at least 6 characters.";
  if (code === "auth/user-not-found" || code === "auth/wrong-password" || code === "auth/invalid-login-credentials") return "Email or password is incorrect.";
  if (code === "auth/operation-not-allowed") return "Email/password sign-in is not enabled in Firebase Authentication.";
  if (code === "permission-denied") return "Signed in, but Firestore rules blocked account or household data. Temporarily allow legacy migration or deploy the household rules.";
  return error?.message || fallback;
}

function promptDay(currentDay) {
  const entered = prompt("Day number, 1-7:", String(Number(currentDay) + 1));
  if (entered === null) return null;
  const day = Number(entered) - 1;
  return Number.isInteger(day) && day >= 0 && day < days.length ? day : Number(currentDay);
}

function formatTodayLabel() {
  return new Date().toLocaleDateString(undefined, {month:"short", day:"numeric"});
}

function previousWeekKey(weekKey = currentWeek) {
  const date = dateFromWeekKey(weekKey) || new Date();
  date.setUTCDate(date.getUTCDate() - 7);
  return getYearWeek(date);
}

function normalizeCategory(category, index) {
  const defaults = DEFAULT_CATEGORY_MAP[category.key] || {};
  const rawLabel = (category.label || defaults.label || category.key || `Row ${index + 1}`).trim();
  const label = defaults.label && !category.details ? defaults.label : rawLabel;
  const key = (category.key || label).trim().replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "").toLowerCase() || `row-${index + 1}`;
  const kind = ["check","number","calculated"].includes(category.kind) ? category.kind : "check";
  return {
    key,
    label,
    details:(category.details || defaults.details || label).trim(),
    kind,
    amount:Number(category.amount || 0),
    group:(category.group || defaults.group || "").trim(),
    goal:Number(category.goal ?? defaults.goal ?? 0),
    goalType:category.goalType === "max" ? "max" : "min",
    goalPeriod:category.goalPeriod === "daily" ? "daily" : "weekly",
    showProgress:category.showProgress === true || category.showTarget === true || category.showWeekly === true,
    showSummary:category.showSummary !== false,
    formula:(category.formula || "").trim()
  };
}

function cloneCategories(list = DEFAULT_CATEGORIES) {
  return list.map((category, index) => normalizeCategory({...category}, index));
}

function categoriesForKid(kid) {
  if (!categoriesByKid[kid] || !categoriesByKid[kid].length) {
    categoriesByKid[kid] = cloneCategories(categories);
  }
  return categoriesByKid[kid];
}

function setAllKidsCategories(list) {
  const normalized = cloneCategories(list);
  categories = cloneCategories(normalized);
  categoriesByKid = Object.fromEntries(kids.map(kid => [kid, cloneCategories(normalized)]));
}

function seedMembersFromNames(names = LEGACY_KIDS) {
  return names.map((name, index) => ({
    id:name,
    displayName:name,
    initials:memberInitials(name),
    role:"child",
    goal:0,
    order:index,
    archived:false
  }));
}

async function loadUserHousehold() {

async function currentHouseholdRole() {

async function requireHouseholdAdmin(action = "change household configuration") {

async function createHousehold(name, options = {}) {
  const householdDoc = db.collection("households").doc();
  householdId = householdDoc.id;
  const now = new Date();
  const householdPayload = {
    name:name.trim() || "My Household",
    scoringMode:options.scoringMode || "money",
    weeklyResetDay:Number(options.weeklyResetDay ?? 1),
    createdBy:currentUser.uid,
    createdAt:now,
    updatedAt:now,
    legacyMigrated:false
  };
  await householdDoc.set(householdPayload);
  await householdDoc.collection("userRoles").doc(currentUser.uid).set({
    role:"owner",
    email:currentUser.email || "",
    createdAt:now
  });
  await db.collection("users").doc(currentUser.uid).set({
    activeHouseholdId:householdId,
    createdAt:now,
    updatedAt:now
  }, {merge:true});
  await Promise.all(seedMembersFromNames().map(member => householdDoc.collection("members").doc(member.id).set({...member, createdAt:now, updatedAt:now})));
  await trackerSettingsRef().set({categories:cloneCategories(DEFAULT_CATEGORIES), categoriesByKid:{}, goalBands, updatedAt:now}, {merge:true});
  householdData = householdPayload;
  return householdId;
}

async function copyCollectionDocs(sourceCollectionRef, targetCollectionRef) {
  const snap = await sourceCollectionRef.get();
  await Promise.all(snap.docs.map(doc => targetCollectionRef.doc(doc.id).set(doc.data(), {merge:true})));
}

async function migrateLegacyData() {
  try {
    const legacySettings = await db.collection("settings").doc("tracker").get();
    if (legacySettings.exists) await trackerSettingsRef().set({...legacySettings.data(), migratedAt:new Date()}, {merge:true});
    const weeksSnap = await db.collection("weeks").get();
    await Promise.all(weeksSnap.docs.map(async weekDoc => {
      const targetWeek = weekRef(weekDoc.id);
      await targetWeek.set(weekDoc.data(), {merge:true});
      await Promise.all(["chores", "notes", "tasks", "logs", "notepads"].map(name => copyCollectionDocs(weekDoc.ref.collection(name), targetWeek.collection(name))));
    }));
    await householdRef().set({legacyMigrated:true, updatedAt:new Date()}, {merge:true});
  } catch (error) {
    console.warn("Legacy migration skipped or incomplete.", error);
  }
}

async function loadHouseholdMembers() {
  const snap = await householdCollection("members").orderBy("order", "asc").get();
  householdMembers = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
  if (!householdMembers.length) {
    householdMembers = seedMembersFromNames();
    await Promise.all(householdMembers.map(member => householdCollection("members").doc(member.id).set({...member, createdAt:new Date(), updatedAt:new Date()}, {merge:true})));
  }
  kids = householdMembers.filter(member => !member.archived).sort((a, b) => Number(a.order || 0) - Number(b.order || 0)).map(member => member.id);
  if (!kids.length) {
    const fallback = householdMembers[0] || seedMembersFromNames(["Member"])[0];
    kids = [fallback.id];
  }
  if (!kids.includes(activeKid)) activeKid = kids[0];
  if (!kids.includes(categoryEditorKid)) categoryEditorKid = kids[0];
}

async function loadCategories() {
  const doc = await trackerSettingsRef().get();
  const data = doc.exists ? doc.data() : {};
  if (Array.isArray(data.goalBands) && data.goalBands.length) goalBands = data.goalBands.map(normalizeGoalBand);
  if (data.categoriesByKid && typeof data.categoriesByKid === "object") {
    kids.forEach(kid => {
      const saved = Array.isArray(data.categoriesByKid[kid]) && data.categoriesByKid[kid].length ? data.categoriesByKid[kid] : data.categories;
      categoriesByKid[kid] = cloneCategories((saved || DEFAULT_CATEGORIES).filter(category => category.key !== "other"));
    });
    categories = cloneCategories(categoriesByKid[kids[0]]);
  } else if (Array.isArray(data.categories) && data.categories.length) {
    setAllKidsCategories(data.categories.filter(category => category.key !== "other"));
  } else {
    setAllKidsCategories(DEFAULT_CATEGORIES);
  }
}

  try {
    goalBands = readGoalBandEditor();
    const editedCategories = readCategoryEditor().map(normalizeCategory);
    categoriesByKid[categoryEditorKid] = editedCategories;

    await trackerSettingsRef().set({
      categories:cloneCategories(editedCategories),
      categoriesByKid,
      goalBands,
      updatedAt:new Date()
    }, {merge:true});

}

    }, {merge:true});

function formatRawValue(value) {
  const number = Number(value || 0);
  if (!Number.isFinite(number)) return "0";
  return Number.isInteger(number) ? String(number) : number.toFixed(1);
}

function formulaName(category) {
  return String(category.key || category.label || "").replace(/[^a-z0-9_]+/gi, "_").replace(/^_+|_+$/g, "") || "value";
}

function formulaAliases(category) {
  const names = new Set();
  [category.key, category.label].filter(Boolean).forEach(value => {
    const alias = formulaName({key:value});
    names.add(alias);
    names.add(alias.toLowerCase());
  });
  return [...names].filter(name => /^[A-Za-z_$][A-Za-z0-9_$]*$/.test(name));
}

function escapeRegExp(text = "") {
  return String(text).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function formulaReferencesCategory(formula = "", category) {
  const text = String(formula || "");
  if (!text.trim()) return false;
  const quotedNames = [category.key, category.label].filter(Boolean);
  if (quotedNames.some(name => new RegExp(`(["'])${escapeRegExp(name)}\\1`, "i").test(text))) return true;
  return formulaAliases(category).some(alias => new RegExp(`\\b${escapeRegExp(alias)}\\b`).test(text));
}

function categoryDayValue(kid, category, dayIndex, data = null, stack = new Set()) {
  if (category.kind === "calculated") {
    if (!categoryDayHasEntry(kid, category, dayIndex, data, stack)) return 0;
    return evaluateFormula(category, kid, dayIndex, data, stack);
  }
  if (data) {
    const value = data[`${dayIndex}-${category.key}`];
    return category.kind === "number" ? Number(value || 0) : value ? 1 : 0;
  }
  const input = document.querySelector(`[data-kid="${kid}"][data-day="${dayIndex}"][data-type="${category.key}"]`);
  if (!input) return 0;
  return category.kind === "number" ? Number(input.value || 0) : input.checked ? 1 : 0;
}

function categoryDayHasEntry(kid, category, dayIndex, data = null, stack = new Set()) {
  if (category.kind === "calculated") {
    if (stack.has(category.key)) return false;
    const nextStack = new Set(stack);
    nextStack.add(category.key);
    const referenced = categoriesForKid(kid).filter(other => {
      if (other.key === category.key) return false;
      return formulaReferencesCategory(category.formula, other);
    });
    const dependencies = referenced.length ? referenced : [];
    return dependencies.length > 0 && dependencies.every(other => categoryDayHasEntry(kid, other, dayIndex, data, nextStack));
  }
  if (data) {
    const dataKey = `${dayIndex}-${category.key}`;
    if (!Object.prototype.hasOwnProperty.call(data, dataKey)) return false;
    if (category.kind === "number") return data[dataKey] !== "" && data[dataKey] !== null && data[dataKey] !== undefined;
    return true;
  }
  const input = document.querySelector(`[data-kid="${kid}"][data-day="${dayIndex}"][data-type="${category.key}"]`);
  if (!input) return false;
  return category.kind === "number" ? input.value !== "" : true;
}

function evaluateFormula(category, kid, dayIndex, data = null, stack = new Set()) {
  const formula = (category.formula || "").trim();
  if (!formula || stack.has(category.key)) return 0;
  const nextStack = new Set(stack);
  nextStack.add(category.key);
  const scope = {};
  const labelValues = {};
  categoriesForKid(kid).forEach(other => {
    if (other.key === category.key) return;
    if (formulaReferencesCategory(formula, other) && !categoryDayHasEntry(kid, other, dayIndex, data, nextStack)) return;
    const value = categoryDayValue(kid, other, dayIndex, data, nextStack);
    formulaAliases(other).forEach(alias => { scope[alias] = value; });
    [other.key, other.label].filter(Boolean).forEach(name => {
      labelValues[String(name).toLowerCase()] = value;
    });
  });
  try {
    const expression = formula.replace(/(["'])(.*?)\1/g, (match, quote, label) => {
      const value = labelValues[String(label).toLowerCase()];
      return Number.isFinite(Number(value)) ? String(value) : match;
    });
    const names = Object.keys(scope);
    const values = Object.values(scope);
    const result = Function(...names, `"use strict"; return (${expression});`)(...values);
    const number = Number(result);
    return Number.isFinite(number) ? number : 0;
  } catch (error) {
    return 0;
  }
}

function goalPercent(category, value, count = 1) {
  const goal = Number(category.goal || 0);
  const number = goalComparisonValue(category, value, count);
  if (!Number.isFinite(goal) || goal <= 0) {
    if (category.goalType === "max") return number <= 0 ? 100 : 0;
    return number > 0 ? 100 : 0;
  }
  return Math.round((number / goal) * 100);
}

function goalComparisonValue(category, value, count = 1) {
  const number = Number(value || 0);
  const divisor = Math.max(Number(count || 1), 1);
  return number / divisor;
}

function updateTotals() {
  const totalsByKid = {};
  kids.forEach(kid => {
    let kidTotal = 0;
    const weeklyRaw = {};
    const weeklyCounts = {};
    const dailyTotals = [];
    days.forEach((day, i) => {
      let dayTotal = 0;
      categoriesForKid(kid).forEach(category => {
        const raw = categoryDayValue(kid, category, i);
        if (category.kind === "calculated") {
          const calcNode = document.getElementById(`${kid}-calc-${category.key}-${i}`);
          if (calcNode) calcNode.textContent = categoryDayHasEntry(kid, category, i) ? formatRawValue(raw) : "";
        }
        const hasEntry = categoryDayHasEntry(kid, category, i);
        if (hasEntry) {
          weeklyRaw[category.key] = (weeklyRaw[category.key] || 0) + raw;
          weeklyCounts[category.key] = (weeklyCounts[category.key] || 0) + 1;
          dayTotal += raw * category.amount;
        }
      });
      kidTotal += dayTotal;
      dailyTotals[i] = dayTotal;
    });
    const dailyMin = dailyTotals.length ? Math.min(...dailyTotals) : 0;
    const dailyMax = dailyTotals.length ? Math.max(...dailyTotals) : 0;
    dailyTotals.forEach((dayTotal, i) => {
      const totalNode = document.getElementById(`${kid}-total-${i}`);
      if (!totalNode) return;
      totalNode.textContent = dollars(dayTotal);
      totalNode.classList.remove("summary-goal-blue", "summary-goal-green", "summary-goal-yellow", "summary-goal-orange", "summary-goal-red", "summary-goal-gray");
      totalNode.classList.add(nameTotalClass(dayTotal, dailyMin, dailyMax));
    });
    totalsByKid[kid] = kidTotal;
    categoriesForKid(kid).forEach(category => {
      const weekNode = document.getElementById(`${kid}-week-${category.key}`);
      if (weekNode) {
        weekNode.classList.remove("summary-goal-blue", "summary-goal-green", "summary-goal-yellow", "summary-goal-orange", "summary-goal-red", "summary-goal-gray");
        if (category.showProgress && (weeklyCounts[category.key] || 0) > 0) {
          const value = weeklyRaw[category.key] || 0;
          const count = category.goalPeriod === "daily" ? weeklyCounts[category.key] || 1 : 1;
          weekNode.classList.add(goalClass(category, value, count));
          weekNode.textContent = `${goalPercent(category, value, count)}%`;
        } else {
          weekNode.textContent = "";
        }
      }
    });
  });
  updateNameMetricColors(totalsByKid);
}

function updateNameMetricColors(totalsByKid = {}) {
  const values = kids.map(kid => Number(totalsByKid[kid] || 0));
  const min = values.length ? Math.min(...values) : 0;
  const max = values.length ? Math.max(...values) : 0;
  kids.forEach(kid => {
    const node = document.getElementById(`rank-${kid}`);
    if (!node) return;
    const value = Number(totalsByKid[kid] || 0);
    node.textContent = dollars(value);
    node.classList.remove("summary-goal-blue", "summary-goal-green", "summary-goal-yellow", "summary-goal-orange", "summary-goal-red", "summary-goal-gray");
    node.classList.add(nameTotalClass(value, min, max));
    node.style.background = "";
    node.style.color = "";
    node.style.borderColor = "";
  });
}

function nameTotalClass(value, min, max) {
  const number = Number(value || 0);
  if (!Number.isFinite(number)) return "summary-goal-gray";
  const range = max - min;
  if (range <= 0) return "summary-goal-green";
  const ratio = (number - min) / range;
  if (ratio >= .8) return "summary-goal-green";
  if (ratio >= .6) return "summary-goal-blue";
  if (ratio >= .4) return "summary-goal-yellow";
  if (ratio >= .2) return "summary-goal-orange";
  return "summary-goal-red";
}

function scoreDataForKid(kid, data = {}) {
  let total = 0;
  days.forEach((day, i) => {
    categoriesForKid(kid).forEach(category => {
      total += categoryDayValue(kid, category, i, data) * category.amount;
    });
  });
  return total;
}

function categoryRawValue(kid, category, data = {}) {
  let total = 0;
  days.forEach((day, i) => {
    if (categoryDayHasEntry(kid, category, i, data)) total += categoryDayValue(kid, category, i, data);
  });
  return total;
}

function categoryEntryCount(kid, category, data = {}) {
  let total = 0;
  days.forEach((day, i) => {
    if (categoryDayHasEntry(kid, category, i, data)) total += 1;
  });
  return total;
}

function dateFromWeekKey(weekKey) {
  const match = String(weekKey).match(/^(\d{4})-W(\d{1,2})$/);
  if (!match) return null;
  const year = Number(match[1]);
  const week = Number(match[2]);
  const simple = new Date(Date.UTC(year, 0, 1 + (week - 1) * 7));
  const day = simple.getUTCDay() || 7;
  simple.setUTCDate(simple.getUTCDate() + 1 - day);
  return simple;
}

function bucketLabel(weekKey, bucket) {
  const date = dateFromWeekKey(weekKey);
  if (!date) return weekKey;
  if (bucket === "year") return String(date.getUTCFullYear());
  if (bucket === "month") return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, "0")}`;
  return weekKey;
}

function periodStart(date, bucket) {
  const copy = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
  if (bucket === "year") copy.setUTCMonth(0, 1);
  if (bucket === "month") copy.setUTCDate(1);
  if (bucket === "week") {
    const day = copy.getUTCDay() || 7;
    copy.setUTCDate(copy.getUTCDate() + 1 - day);
  }
  copy.setUTCHours(0, 0, 0, 0);
  return copy;
}

async function summaryWeekKeys(bucket = "week", count = 12) {
  const snap = await householdCollection("weeks").orderBy("timestamp", "desc").get();
  const keys = new Set([currentWeek]);
  snap.forEach(doc => keys.add(doc.id));
  const parsed = [...keys].map(key => ({key, date:dateFromWeekKey(key)})).filter(item => item.date);
  const starts = [...new Set(parsed.map(item => periodStart(item.date, bucket).toISOString()))].sort().reverse().slice(0, Math.max(Number(count || 12), 1));
  const allowed = new Set(starts);
  return parsed.filter(item => allowed.has(periodStart(item.date, bucket).toISOString())).map(item => item.key).sort().reverse();
}

function formatSummaryMetric(value) {
  const mode = householdData?.scoringMode || "money";
  const rounded = Math.round(Number(value || 0));
  if (mode === "money") return dollars(value);
  if (mode === "percent") return `${rounded}%`;
  if (mode === "completion") return String(rounded);
  return `${rounded} pts`;
}

async function fetchOverallSummaryRows(bucket, count) {
  const weekKeys = await summaryWeekKeys(bucket, count);
  const labels = [...new Set(weekKeys.map(weekKey => bucketLabel(weekKey, bucket)))].sort().reverse().slice(0, Math.max(Number(count || 12), 1));
  const rows = kids.map(kid => ({kid, values:Object.fromEntries(labels.map(label => [label, null]))}));
  await Promise.all(weekKeys.flatMap(weekKey => rows.map(async row => {
    const label = bucketLabel(weekKey, bucket);
    if (!labels.includes(label)) return;
    const choresDoc = await weekRef(weekKey).collection("chores").doc(row.kid).get();
    const score = scoreSummaryDataForKid(row.kid, choresDoc.exists ? choresDoc.data() : {});
    if (score !== null) row.values[label] = (row.values[label] || 0) + score;
  })));
  return {labels, rows};
}

function overallSummaryClass(value, min, max) {
  const number = Number(value || 0);
  if (!Number.isFinite(number)) return "";
  const range = max - min;
  const ratio = range > 0 ? (number - min) / range : .65;
  if (ratio >= .75) return "summary-goal-green";
  if (ratio >= .5) return "summary-goal-yellow";
  if (ratio >= .25) return "summary-goal-orange";
  return "summary-goal-red";
}

function renderOverallSummaryRows(summary) {
  let head = `<tr><th>Person</th>`;
  summary.labels.forEach(label => { head += `<th>${label}</th>`; });
  head += `</tr>`;
  const values = summary.rows.flatMap(row => summary.labels.map(label => row.values[label])).filter(value => value !== null && Number.isFinite(Number(value)));
  const min = values.length ? Math.min(...values.map(Number)) : 0;
  const max = values.length ? Math.max(...values.map(Number)) : 0;
  const body = summary.rows.map(row => {
    let html = `<tr><td>${escapeHtml(memberLabel(row.kid))}</td>`;
    summary.labels.forEach(label => {
      const value = row.values[label];
      html += value === null ? `<td></td>` : `<td class="${overallSummaryClass(value, min, max)}">${formatSummaryMetric(value)}</td>`;
    });
    html += `</tr>`;
    return html;
  }).join("");
  return `<div class="summary-table-wrap"><table class="summary-table"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

async function fetchDetailedSummary(kid, bucket, count) {
  const weekKeys = await summaryWeekKeys(bucket, count);
  const buckets = {};
  await Promise.all(weekKeys.map(async weekKey => {
    const label = bucketLabel(weekKey, bucket);
    if (!buckets[label]) buckets[label] = {weeks:new Set(), values:{}};
    buckets[label].weeks.add(weekKey);
    const choresDoc = await weekRef(weekKey).collection("chores").doc(kid).get();
    const data = choresDoc.exists ? choresDoc.data() : {};
    categoriesForKid(kid).forEach(category => {
      buckets[label].values[category.key] = (buckets[label].values[category.key] || 0) + categoryRawValue(kid, category, data);
      buckets[label].values[`${category.key}__count`] = (buckets[label].values[`${category.key}__count`] || 0) + categoryEntryCount(kid, category, data);
    });
  }));
  return {labels:Object.keys(buckets).sort().reverse().slice(0, Math.max(Number(count || 12), 1)), buckets};
}

function renderDetailedSummary(kid, detail) {
  const categories = summaryCategoriesForKid(kid);
  let head = `<tr><th>Item</th><th>Period</th><th>Type</th><th>Goal</th>`;
  detail.labels.forEach(label => { head += `<th>${label}</th>`; });
  head += `</tr>`;
  let previousGroup = "";
  const body = categories.map(category => {
    const group = category.group || "";
    const groupClass = group && group !== previousGroup ? "group-start" : "";
    previousGroup = group;
    const goalType = category.goalType === "min" ? "Min" : "Max";
    const goalPeriod = category.goalPeriod === "daily" ? "D" : "W";
    let html = `<tr class="${groupClass}"><td>${escapeHtml(category.label)}</td><td>${goalPeriod}</td><td>${goalType}</td><td>${Number(category.goal || 0).toFixed(0)}</td>`;
    detail.labels.forEach(label => {
      const bucket = detail.buckets[label];
      const entryCount = bucket.values[`${category.key}__count`] || 0;
      if (entryCount === 0) {
        html += `<td></td>`;
        return;
      }
      const sum = bucket.values[category.key] || 0;
      const weeks = Math.max(bucket.weeks.size, 1);
      const count = category.goalPeriod === "daily" ? entryCount : weeks;
      const value = category.goalPeriod === "daily" ? sum / count : sum;
      const cellClass = category.goalPeriod === "daily" ? goalClass(category, value, 1, true) : goalClass(category, value, count);
      html += `<td class="${cellClass}">${value.toFixed(0)}</td>`;
    });
    html += `</tr>`;
    return html;
  }).join("");
  return `<div class="summary-table-wrap"><table class="summary-table"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}


function normalizeGoalBand(band = {}) {
  const color = ["blue", "green", "yellow", "red", "gray"].includes(band.color) ? band.color : "green";
  return {threshold:Number(band.threshold || 0), color};
}

function goalBandPercent(category, value, count = 1, valueIsNormalized = false) {
  const goal = Number(category.goal || 0);
  const comparisonValue = valueIsNormalized ? Number(value || 0) : goalComparisonValue(category, value, count);
  if (!Number.isFinite(goal) || goal <= 0) return comparisonValue > 0 ? 150 : 100;
  if (category.goalType === "max") {
    if (comparisonValue <= 0) return 150;
    return Math.round((goal / comparisonValue) * 100);
  }
  return Math.round((comparisonValue / goal) * 100);
}

function goalBandClass(category, value, count = 1, valueIsNormalized = false) {
  const percent = goalBandPercent(category, value, count, valueIsNormalized);
  const sorted = goalBands.map(normalizeGoalBand).sort((a, b) => Number(b.threshold) - Number(a.threshold));
  const match = sorted.find(band => percent >= Number(band.threshold));
  return `summary-goal-${match?.color || "green"}`;
}

function renderGoalBandEditor() {
  const editor = document.getElementById("goal-band-editor");
  if (!editor) return;
  editor.innerHTML = goalBands.map((band, index) => {
    const normalized = normalizeGoalBand(band);
    return `<div class="goal-band-row" data-goal-band-row><input type="number" min="0" step="1" data-field="threshold" aria-label="Percent threshold" value="${Number(normalized.threshold)}" placeholder="Percent"><select data-field="color" aria-label="Color"><option value="blue" ${normalized.color === "blue" ? "selected" : ""}>Blue</option><option value="green" ${normalized.color === "green" ? "selected" : ""}>Green</option><option value="yellow" ${normalized.color === "yellow" ? "selected" : ""}>Yellow</option><option value="red" ${normalized.color === "red" ? "selected" : ""}>Red</option><option value="gray" ${normalized.color === "gray" ? "selected" : ""}>Gray</option></select><button class="icon-btn remove-goal-band" type="button" aria-label="Delete color">x</button></div>`;
  }).join("");
}

function readGoalBandEditor() {
  const rows = [...document.querySelectorAll("#goal-band-editor [data-goal-band-row]")];
  const bands = rows.map(row => normalizeGoalBand({
    threshold:row.querySelector('[data-field="threshold"]').value,
    color:row.querySelector('[data-field="color"]').value
  })).sort((a, b) => Number(b.threshold) - Number(a.threshold));
  return bands.length ? bands : [{threshold:100, color:"green"}, {threshold:0, color:"red"}];
}

function goalClass(category, value, count = 1, valueIsNormalized = false) {
  return goalBandClass(category, value, count, valueIsNormalized);
}

async function refreshSummary() {
  const content = document.getElementById("summary-content");
  const kind = document.getElementById("summary-kind").value;
  const bucket = document.getElementById("summary-bucket").value;
  const count = Number(document.getElementById("summary-count").value || 12);
  content.className = "summary-empty";
  content.textContent = "Loading summary...";
  if (kind === "detailed") {
    const kid = document.getElementById("summary-person").value || activeKid;
    const detail = await fetchDetailedSummary(kid, bucket, count);
    content.className = "";
    content.innerHTML = detail.labels.length ? renderDetailedSummary(kid, detail) : `<div class="summary-empty">No data in this range.</div>`;
    return;
  }
  const summary = await fetchOverallSummaryRows(bucket, count);
  content.className = "";
  content.innerHTML = summary.labels.length ? renderOverallSummaryRows(summary) : `<div class="summary-empty">No data in this range.</div>`;
}

async function loadTasks(kid) {
  const doc = await weekRef(currentWeek).collection("tasks").doc(kid).get();
  const saved = doc.exists && Array.isArray(doc.data().items) ? doc.data().items : [];
  const legacy = [];
  days.forEach((day, i) => {
    const data = notesCache[noteKey(kid, i)] || {};
    if ((data.other || "").trim()) {
      legacy.push({id:`legacy-task-${i}`, day:i, text:data.other, done:!!data.otherDone, legacy:true});
    }
  });
  tasksCache[kid] = saved.length ? saved : legacy;
}

}

  days.forEach((day, i) => {
    const data = notesCache[noteKey(kid, i)] || {};
    const good = combinedGood(data).trim();
    const bad = combinedBad(data).trim();
    if (good) legacy.push({id:`legacy-good-${i}`, day:i, type:"good", note:good, outcome:"", legacy:true});
    if (bad) legacy.push({id:`legacy-bad-${i}`, day:i, type:"bad", note:bad, outcome:"", legacy:true});
  });
  logsCache[kid] = saved.length ? saved : legacy;
}

async function saveLogs(kid) {

async function populateWeekDropdown() {
  const select = document.getElementById("week-select");
  select.innerHTML = "";
  const weeksSnap = await householdCollection("weeks").get();
  const seen = new Set();
  weeksSnap.forEach(doc => {
    seen.add(doc.id);
  });
  seen.add(currentWeek);
  [...seen].sort((a, b) => b.localeCompare(a, undefined, {numeric:true})).forEach(weekKey => {
    select.appendChild(new Option(weekKey, weekKey, weekKey === currentWeek, weekKey === currentWeek));
  });
  select.appendChild(new Option("Add New", "__add_new__"));
}

async function ensureWeekOption(weekKey) {
  const select = document.getElementById("week-select");
  if (![...select.options].some(option => option.value === weekKey)) {
    select.prepend(new Option(weekKey, weekKey, true, true));
  }
  select.value = weekKey;
}

async function addHistoricalWeek() {
  const entered = prompt("Week to add, like 2026-W07:", previousWeekKey());
  if (entered === null) return;
  const weekKey = entered.trim().toUpperCase();
  if (!/^\d{4}-W\d{2}$/.test(weekKey)) {
    alert("Use the format YYYY-W##.");
    document.getElementById("week-select").value = currentWeek;
    return;
  }
  const existing = document.getElementById("week-select");
  if ([...existing.options].some(option => option.value === weekKey)) {
    alert("That week already exists.");
    existing.value = currentWeek;
    return;
  }
  await weekRef(weekKey).set({timestamp:new Date(), historical:true}, {merge:true});
  await populateWeekDropdown();
  await loadData(weekKey);
}



function summaryCategoriesForKid(kid) {
  return categoriesForKid(kid).filter(category => category.showSummary !== false);
}

function scoreSummaryDataForKid(kid, data = {}) {
  let total = 0;
  let entries = 0;
  days.forEach((day, i) => {
    summaryCategoriesForKid(kid).forEach(category => {
      if (!categoryDayHasEntry(kid, category, i, data)) return;
      entries += 1;
      total += categoryDayValue(kid, category, i, data) * category.amount;
    });
  });
  return entries ? total : null;
}

function dateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
}

function localDateLabel(date) {
  return date.toLocaleDateString(undefined, {weekday:"short", month:"numeric", day:"numeric"});
}

function addDays(date, count) {
  const copy = new Date(date);
  copy.setDate(copy.getDate() + count);
  return copy;
}

function calendarRangeDates(range = calendarRange) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  let start = new Date(today);
  let count = 7;
  if (range === "week") {
    const day = start.getDay() || 7;
    start = addDays(start, 1 - day);
    count = 7;
  } else if (range === "month") {
    start = new Date(today.getFullYear(), today.getMonth(), 1);
    count = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
  } else if (range === "3months" || range === "6months") {
    start = new Date(today.getFullYear(), today.getMonth(), 1);
    const months = range === "3months" ? 3 : 6;
    const end = new Date(today.getFullYear(), today.getMonth() + months, 0);
    count = Math.round((end - start) / 86400000) + 1;
  } else if (range === "year") {
    start = new Date(today.getFullYear(), 0, 1);
    const end = new Date(today.getFullYear(), 11, 31);
    count = Math.round((end - start) / 86400000) + 1;
  }
  return Array.from({length:count}, (_, index) => addDays(start, index));
}

function calendarCellValue(dayKey, column) {
  return calendarEvents?.[dayKey]?.[column] || "";
}

function calendarDayTotal(dayKey) {
  return calendarColumns.reduce((total, column) => total + (calendarCellValue(dayKey, column).trim() ? 1 : 0), 0);
}

function calendarRangeTotal(range = calendarRange) {
  return calendarRangeDates(range).reduce((sum, date) => sum + calendarDayTotal(dateKey(date)), 0);
}

function calendarTotalClass(value, min, max) {
  const number = Number(value || 0);
  if (!Number.isFinite(number)) return "summary-goal-gray";
  const range = max - min;
  if (range <= 0) return number > 0 ? "summary-goal-red" : "summary-goal-green";
  const ratio = (number - min) / range;
  if (ratio >= .8) return "summary-goal-red";
  if (ratio >= .6) return "summary-goal-orange";
  if (ratio >= .4) return "summary-goal-yellow";
  if (ratio >= .2) return "summary-goal-blue";
  return "summary-goal-green";
}

async function loadCalendarData() {
  try {
    const [configDoc, eventsDoc] = await Promise.all([calendarConfigRef().get(), calendarEventsRef().get()]);
    const config = configDoc.exists ? configDoc.data() : {};
    calendarColumns = Array.isArray(config.columns) && config.columns.length ? config.columns : [...DEFAULT_CALENDAR_COLUMNS];
    calendarEvents = eventsDoc.exists && eventsDoc.data().events ? eventsDoc.data().events : {};
  } catch (error) {
    console.warn("Calendar data could not load.", error);
    calendarColumns = [...DEFAULT_CALENDAR_COLUMNS];
    calendarEvents = {};
  }
}

function renderCalendar() {
  document.querySelectorAll("[data-calendar-range]").forEach(button => button.classList.toggle("active", button.dataset.calendarRange === calendarRange));
  document.querySelectorAll("[data-calendar-range-total]").forEach(node => {
    node.textContent = String(calendarRangeTotal(node.dataset.calendarRangeTotal));
  });
  const wrap = document.getElementById("calendar-table-wrap");
  if (!wrap) return;
  const dates = calendarRangeDates();
  const totals = dates.map(date => calendarDayTotal(dateKey(date)));
  const min = totals.length ? Math.min(...totals) : 0;
  const max = totals.length ? Math.max(...totals) : 0;
  const periodTotalNode = document.getElementById("calendar-period-total");
  if (periodTotalNode) periodTotalNode.textContent = String(calendarRangeTotal(calendarRange));
  let html = `<div class="calendar-table" style="grid-template-columns:42px 74px repeat(${calendarColumns.length}, minmax(0, 1fr));">`;
  html += `<div class="calendar-header"></div><div class="calendar-header">Day</div>`;
  calendarColumns.forEach(column => { html += `<div class="calendar-header calendar-column-head">${escapeHtml(column)}</div>`; });
  dates.forEach(date => {
    const key = dateKey(date);
    const isToday = key === dateKey(new Date());
    const todayClass = isToday ? " today-row" : "";
    html += `<div class="calendar-total${todayClass} ${calendarTotalClass(calendarDayTotal(key), min, max)}" data-calendar-total="${key}">${calendarDayTotal(key)}</div>`;
    html += `<div class="calendar-day${todayClass} ${isToday ? "today" : ""}">${escapeHtml(localDateLabel(date))}</div>`;
    calendarColumns.forEach(column => {
      const value = calendarCellValue(key, column);
      html += `<textarea class="calendar-cell${todayClass} ${value.trim() ? "has-content" : ""}" data-calendar-day="${key}" data-calendar-column="${escapeAttr(column)}" placeholder="">${escapeHtml(value)}</textarea>`;
    });
  });
  html += `</div>`;
  wrap.innerHTML = html;
}

function syncCalendarCellToCache(cell) {
  const day = cell.dataset.calendarDay;
  const column = cell.dataset.calendarColumn;
  calendarEvents[day] = calendarEvents[day] || {};
  const value = cell.value.trim();
  if (value) calendarEvents[day][column] = value;
  else delete calendarEvents[day][column];
  if (!Object.keys(calendarEvents[day]).length) delete calendarEvents[day];
  cell.classList.toggle("has-content", Boolean(value));
}

function refreshCalendarTotals() {
  document.querySelectorAll("[data-calendar-range-total]").forEach(node => {
    node.textContent = String(calendarRangeTotal(node.dataset.calendarRangeTotal));
  });
  const dates = calendarRangeDates();
  const totals = dates.map(date => calendarDayTotal(dateKey(date)));
  const min = totals.length ? Math.min(...totals) : 0;
  const max = totals.length ? Math.max(...totals) : 0;
  const periodTotalNode = document.getElementById("calendar-period-total");
  if (periodTotalNode) periodTotalNode.textContent = String(calendarRangeTotal(calendarRange));
  dates.forEach(date => {
    const key = dateKey(date);
    const node = document.querySelector(`.calendar-total[data-calendar-total="${key}"]`);
    if (!node) return;
    const total = calendarDayTotal(key);
    node.textContent = String(total);
    node.classList.remove("summary-goal-blue", "summary-goal-green", "summary-goal-yellow", "summary-goal-orange", "summary-goal-red", "summary-goal-gray");
    node.classList.add(calendarTotalClass(total, min, max));
  });
}

    const noteTitle = escapeAttr(notes.map(note => note.text || "").filter(Boolean).join(" | "));
    const noteIcon = notes.length ? `<button class="note-indicator" data-family-task-note-prompt="${task.id}" title="${noteTitle}" aria-label="Task notes">□</button>` : `<button class="note-indicator empty" data-family-task-note-prompt="${task.id}" aria-label="Add note">□</button>`;
    return `<div class="family-task-row ${task.completed ? "complete" : ""}" data-family-task-row="${task.id}">${completeAction}<input class="family-task-cell family-task-project" data-family-task-field="project" data-task-id="${task.id}" value="${escapeAttr(task.project || "")}" placeholder="Project"><input class="family-task-cell family-task-title" data-family-task-field="title" data-task-id="${task.id}" value="${escapeAttr(task.title || "")}" placeholder="Task"><select class="family-task-cell family-task-who ${personColors[task.who] || "summary-goal-gray"}" data-family-task-field="who" data-task-id="${task.id}">${taskPeopleOptions(task.who || kids[0])}</select><input class="family-task-cell family-task-date" type="date" data-family-task-field="endDate" data-task-id="${task.id}" value="${escapeAttr(task.endDate || "")}"><select class="family-task-cell family-task-status status-${task.status || "now"}" data-family-task-field="status" data-task-id="${task.id}">${taskStatusOptions(task.status || "now")}</select><div class="family-task-actions">${noteIcon}<button class="mini-action delete" data-delete-family-task="${task.id}" aria-label="Delete task">×</button></div></div>`;
  };
  const taskHeader = `<div class="family-task-row family-task-header"><span></span><div>Project</div><div>Task</div><div>Who</div><div>Date</div><div>Status</div><div>Edit</div></div>`;
  const sortTasks = tasks => tasks.slice().sort((a, b) => {
    const projectCompare = String(a.project || "").localeCompare(String(b.project || ""));
    if (projectCompare) return projectCompare;
    const statusCompare = FAMILY_TASK_STATUSES.indexOf(a.status || "now") - FAMILY_TASK_STATUSES.indexOf(b.status || "now");
    if (statusCompare) return statusCompare;
    return String(a.endDate || "9999").localeCompare(String(b.endDate || "9999"));
  });
  const active = visibleFamilyTasks(false);
  const completed = visibleFamilyTasks(true);
  activeList.innerHTML = active.length ? taskHeader + sortTasks(active).map(renderRow).join("") : `<div class="empty-state">All tasks complete. Nice work.</div>`;
  completedList.innerHTML = completed.length ? completed.map(renderRow).join("") : `<div class="empty-state">No completed tasks yet.</div>`;
  if (completedCount) completedCount.textContent = String(completed.length);
}

async function addFamilyTask() {
  const title = document.getElementById("family-task-title").value.trim();
  if (!title) {
    alert("Add a task name first.");
    return;
  }
  const now = new Date();
  const doc = taskCollectionRef().doc();
  const note = document.getElementById("family-task-note").value.trim();
  const task = {
    project:document.getElementById("family-task-project").value.trim(),
    title,
    who:document.getElementById("family-task-who").value || kids[0],
    endDate:document.getElementById("family-task-end").value,
    status:document.getElementById("family-task-status").value || "now",
    completed:false,
    notes:note ? [{id:makeId("note"), text:note, createdAt:now.toISOString()}] : [],
    createdAt:now,
    updatedAt:now
  };
  try {
    await doc.set(task);
    familyTasksCache.push({id:doc.id, ...task});
    toggleFamilyTaskForm(false);
    renderFamilyTaskList();
  } catch (error) {
    console.error("Task save failed", error);
    alert("Task did not save. Make sure Firestore rules include households/{householdId}/tasks and this account belongs to the household.");
  }
}

async function completeFamilyTask(id, completed = true) {
  const patch = {completed, updatedAt:new Date()};
  if (completed) patch.completedAt = new Date();
  await taskCollectionRef().doc(id).set(patch, {merge:true});
  familyTasksCache = familyTasksCache.map(task => task.id === id ? {...task, ...patch} : task);
  renderFamilyTaskList();
}

async function addFamilyTaskNote(id) {
  const input = document.querySelector(`[data-family-task-note-input="${id}"]`);
  const text = input?.value.trim();
  if (!text) return;
  const task = familyTasksCache.find(item => item.id === id);
  if (!task) return;
  const notes = [...(Array.isArray(task.notes) ? task.notes : []), {id:makeId("note"), text, createdAt:new Date().toISOString()}];
  await taskCollectionRef().doc(id).set({notes, updatedAt:new Date()}, {merge:true});
  familyTasksCache = familyTasksCache.map(item => item.id === id ? {...item, notes} : item);
  renderFamilyTaskList();
}

async function updateFamilyTaskField(id, field, value) {
  const allowed = new Set(["project", "title", "who", "endDate", "status"]);
  if (!allowed.has(field)) return;
  const normalized = field === "status" && !FAMILY_TASK_STATUSES.includes(value) ? "now" : value;
  const patch = {[field]:normalized, updatedAt:new Date()};
  await taskCollectionRef().doc(id).set(patch, {merge:true});
  familyTasksCache = familyTasksCache.map(item => item.id === id ? {...item, ...patch} : item);
  renderFamilyTaskList();
}

async function promptFamilyTaskNote(id) {
  const task = familyTasksCache.find(item => item.id === id);
  if (!task) return;
  const existing = Array.isArray(task.notes) ? task.notes.map(note => note.text || "").filter(Boolean).join("\\n") : "";
  const text = prompt(existing ? "Task notes:" : "Add note:", existing);
  if (text === null) return;
  const notes = text.trim() ? [{id:makeId("note"), text:text.trim(), createdAt:new Date().toISOString()}] : [];
  await taskCollectionRef().doc(id).set({notes, updatedAt:new Date()}, {merge:true});
  familyTasksCache = familyTasksCache.map(item => item.id === id ? {...item, notes} : item);
  renderFamilyTaskList();
}

async function editFamilyTask(id) {
  await promptFamilyTaskNote(id);
}

async function deleteFamilyTask(id) {
  if (!confirm("Delete this task?")) return;
  await taskCollectionRef().doc(id).delete();
  familyTasksCache = familyTasksCache.filter(task => task.id !== id);
  renderFamilyTaskList();
}

function openModal(id) {
  document.getElementById(id).style.display = "flex";
}

function closeModal(id) {
  if (currentScreen?.modalId === id) {
    showTrackerScreen();
    return;
  }
  document.getElementById(id).style.display = "none";
}

function openMainScreen(modalId, title, backLabel = "Tracker") {
  showTrackerScreen(false);
  const modal = document.getElementById(modalId);
  const content = modal?.querySelector(".modal-content");
  if (!modal || !content) return;
  if (currentScreen) restoreScreenModal();
  currentScreen = {modalId, parent:modal, content, railNode:null, railParent:null, railNext:null};
  modal.style.display = "none";
  const titleNode = document.getElementById("screen-title");
  titleNode.textContent = title || "";
  titleNode.style.display = title ? "" : "none";
  document.getElementById("screen-back").textContent = `Back to ${backLabel}`;
  document.getElementById("screen-content").replaceChildren(content);
  moveCurrentScreenControlsToRail();
  document.body.classList.add("subpage-active");
  document.getElementById("kid-views").style.display = "none";
  document.getElementById("kid-tabs").style.display = "none";
  document.getElementById("screen-view").classList.add("active");
}

function restoreScreenModal() {
  if (!currentScreen) return;
  restoreCurrentScreenControls();
  currentScreen.parent.appendChild(currentScreen.content);
  currentScreen.parent.style.display = "none";
  currentScreen = null;
}

function screenRailSelector(modalId) {
  if (modalId === "summary-modal") return ".summary-controls";
  if (modalId === "category-modal") return ".category-side";
  if (modalId === "tasks-modal") return ".family-tasks-side";
  if (modalId === "calendar-modal") return ".calendar-side";
  if (modalId === "settings-modal") return ".household-side";
  return "";
}

function moveCurrentScreenControlsToRail() {
  if (!currentScreen) return;
  const selector = screenRailSelector(currentScreen.modalId);
  const rail = document.getElementById("subpage-rail");
  const node = selector ? currentScreen.content.querySelector(selector) : null;
  if (!rail || !node) return;
  currentScreen.railNode = node;
  currentScreen.railParent = node.parentElement;
  currentScreen.railNext = node.nextSibling;
  rail.replaceChildren(node);
}

function restoreCurrentScreenControls() {
  if (!currentScreen?.railNode || !currentScreen.railParent) return;
  if (currentScreen.railNext && currentScreen.railNext.parentElement === currentScreen.railParent) {
    currentScreen.railParent.insertBefore(currentScreen.railNode, currentScreen.railNext);
  } else {
    currentScreen.railParent.appendChild(currentScreen.railNode);
  }
  document.getElementById("subpage-rail")?.replaceChildren();
}

function showTrackerScreen(restore = true) {
  if (restore) restoreScreenModal();
  document.body.classList.remove("subpage-active");
  document.getElementById("screen-view")?.classList.remove("active");
  const content = document.getElementById("screen-content");
  if (content && !currentScreen) content.innerHTML = "";
  document.getElementById("kid-views").style.display = "";
  document.getElementById("kid-tabs").style.display = "";
  document.getElementById("subpage-rail")?.replaceChildren();
}

function escapeHtml(text = "") {
  return text.replace(/[&<>"']/g, char => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]));
}

function escapeAttr(text = "") {
  return escapeHtml(String(text));
}

async function signInOrCreate(createAccount = false) {
  const email = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-password").value;

  if (!email || !password) {
    setAuthMessage("Enter an email and password.");
    return;

  setAuthMessage(createAccount ? "Creating account..." : "Signing in...");
  try {
    await auth.setPersistence(staySignedIn ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
    const credential = createAccount
      ? await auth.createUserWithEmailAndPassword(email, password)
      : await auth.signInWithEmailAndPassword(email, password);
    await handleSignedInUser(credential.user);
  } catch (error) {
    setAuthMessage(friendlyFirebaseError(error, "Sign in failed."));
  }

async function createHouseholdFromSetup() {
  const name = document.getElementById("household-name").value.trim();
  const scoringMode = document.getElementById("household-scoring").value;
  const weeklyResetDay = document.getElementById("household-reset-day").value;
  const importLegacy = document.getElementById("household-import-legacy").checked;
  if (!name) {
    setHouseholdMessage("Name the household first.");
    return;
  }
  setHouseholdMessage("Creating household...");
  try {
    if (importLegacy && !canImportLegacy) {
      setHouseholdMessage("This account is not approved to import existing tracker data.");
      return;
    }
    firstHouseholdSetup = !importLegacy;
    await createHousehold(name, {scoringMode, weeklyResetDay});

      await migrateLegacyData();
    }
    await startHouseholdApp();
    if (firstHouseholdSetup) openMemberEditor();
  } catch (error) {
    setHouseholdMessage(error.message || "Could not create household.");
  }
}

  target.parentElement.insertBefore(draggedCategoryRow, after ? target.nextSibling : target);
});

  if (input) saveData(input.dataset.kid);
});

document.body.addEventListener("input", event => {
  const input = event.target.closest("[data-kid][data-day][data-type]");
  if (input) updateTotals();
  const calendarCell = event.target.closest("[data-calendar-day][data-calendar-column]");
  if (calendarCell) {
    syncCalendarCellToCache(calendarCell);
    refreshCalendarTotals();
  }
});

function focusGridElement(elements, current, columns, dx, dy) {
  const index = elements.indexOf(current);
  if (index < 0) return false;
  const next = index + dx + (dy * columns);
  if (next < 0 || next >= elements.length) return false;
  elements[next].focus();
  if (elements[next].select) elements[next].select();
  return true;
}

document.body.addEventListener("keydown", event => {
  const directions = {
    ArrowLeft:[-1, 0],
    ArrowRight:[1, 0],
    ArrowUp:[0, -1],
    ArrowDown:[0, 1]
  };
  if (!directions[event.key]) return;
  const calendarCell = event.target.closest(".calendar-cell");
  if (calendarCell) {
    event.preventDefault();
    const cells = [...document.querySelectorAll(".calendar-cell")];

window.onload = () => {
  showOnly("auth-screen");
  auth.onAuthStateChanged(async user => {
    try {
      if (!user) {
        authLoadToken++;
        currentUser = null;
        householdId = null;
        showOnly("auth-screen");
        return;
      }
      if (currentUser?.uid === user.uid && householdId) return;
      await handleSignedInUser(user);
    } catch (error) {
      console.error(error);
      setAuthMessage(friendlyFirebaseError(error, "Could not load account."));
      showOnly("auth-screen");
    }
  });
};

// Open compact configuration notes in a prompt instead of resizing the table row.
document.body.addEventListener("click", event => {
  const notes = event.target.closest('#category-editor textarea[data-field="details"]');
  if (!notes) return;
  event.preventDefault();
  notes.blur();
  const next = prompt("Category notes:", notes.value || "");
  if (next !== null) notes.value = next;
});
